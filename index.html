  else if (activeTab === 'registar') main.innerHTML = renderRegistar();
  else if (activeTab === 'calendario') main.innerHTML = renderCalendario();
  else if (activeTab === 'agua') main.innerHTML = renderAgua();
  else if (activeTab === 'perfil') main.innerHTML = renderPerfil();

  if (window.lucide) lucide.createIcons();
  if (activeTab === 'dashboard') requestAnimationFrame(renderDashChart);
}

// Fundo/relevo partilhado por todos os cartões de estatística do Início —
// dá a cada módulo uma identidade cromática própria em vez da superfície
// neutra única que havia antes. Os dois temas pedem tratamentos opostos:
// - Escuro: cor forte (brilho radial + gradiente tingido) fica vibrante
//   sobre o quase-preto sem parecer exagerada — mantido tal como estava.
// - Claro: a mesma abordagem tingia o cartão inteiro e ficava "colorido de
//   mais", pouco profissional. Aqui o cartão volta a ser limpo/neutro
//   (branco, sombra suave discreta) e a cor do módulo fica só como um
//   detalhe — uma barra fina à esquerda — deixando o destaque para os
//   números, anéis e setas de tendência lá dentro (já coloridos).
function statCardBg(color){
  const isLight = theme === 'light';
  if (isLight) {
    return `background:
        radial-gradient(130% 150% at 100% 0%, color-mix(in srgb, ${color} 10%, transparent) 0%, transparent 60%),
        linear-gradient(165deg, #ffffff, var(--surf-800));
      border-style:solid; border-width:1px 1px 1px 3px;
      border-color: var(--brd-700) var(--brd-700) var(--brd-700) color-mix(in srgb, ${color} 70%, var(--brd-700));
      box-shadow: 0 1px 2px rgba(15,23,42,0.06), 0 4px 14px -5px rgba(15,23,42,0.16), inset 0 1px 0 rgba(255,255,255,0.6);`;
  }
  return `background:
      radial-gradient(130% 150% at 100% 0%, color-mix(in srgb, ${color} 22%, transparent) 0%, transparent 60%),
      linear-gradient(165deg, var(--surf-800), var(--surf-950));
    border:1px solid color-mix(in srgb, ${color} 28%, var(--brd-700));
    box-shadow: 0 6px 16px -6px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);`;
}

// Cartão de módulo no Início: selo de cor + barra lateral que identificam o
// módulo, sobre o mesmo fundo com relevo/textura dos restantes cartões.
function moduleCard({ onclick, icon, color, g1, g2, title, sub, soon }){
  return `
    <button ${onclick ? `onclick="${onclick}"` : ''}
      class="relative rounded-2xl p-3.5 text-left flex items-center gap-3 transition ${onclick ? 'active:scale-[0.98]' : 'cursor-default'} ${soon ? 'opacity-60' : ''}"
      style="${statCardBg(color)}">
      <span class="absolute left-0 top-3 bottom-3 w-[3px] rounded-full" style="background:${color}"></span>
      <span class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style="background:linear-gradient(135deg,${g1},${g2})">
        <i data-lucide="${icon}" class="w-5 h-5 text-white"></i>
      </span>
      <div class="min-w-0">
        <p class="text-sm font-bold text-white leading-tight">${title}</p>
        <p class="text-[11px] text-slate-400 mt-0.5 truncate">${sub}</p>
      </div>
    </button>`;
}

/* ============================= INÍCIO (visão geral das verticais) ============================= */
// Anel de progresso em SVG puro (sem lib de gráficos) — usado no cartão de
// calorias e nos mini-cartões do Corpo. Começa às 12h e avança no sentido dos
// ponteiros do relógio (rotação -90° no <svg>); o texto sobreposto não roda.
function emptyFillColor(){
  return theme === 'light' ? 'rgba(15,23,42,0.10)' : 'rgba(255,255,255,0.09)';
}
function ringSvg(pct, { size = 96, stroke = 8, color = 'var(--accent)', trackColor = emptyFillColor() } = {}){
  const r = (size - stroke) / 2;
  const c = size / 2;
  const circumference = 2 * Math.PI * r;
  const dash = circumference * Math.max(0, Math.min(100, pct)) / 100;
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="-rotate-90">
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${trackColor}" stroke-width="${stroke}" />
      ${dash > 0.5 ? `<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round"
        stroke-dasharray="${dash} ${circumference}" style="transition: stroke-dasharray .4s ease" />` : ''}
    </svg>`;
}

// Barra de progresso horizontal — usada onde o anel não se aplica bem por
// não haver uma meta real definida pelo utilizador (ex.: pace da Corrida,
// que usa uma escala fixa de referência, não um objetivo do Perfil).
function gaugeBar(pct, { color = 'var(--accent)' } = {}){
  const width = Math.max(0, Math.min(100, pct));
  return `
    <div class="w-full h-1.5 rounded-full overflow-hidden" style="background:${emptyFillColor()}">
      <div class="h-full rounded-full" style="width:${width}%;background:${color};transition:width .4s ease"></div>
    </div>`;
}

// Cartão principal do Início: substitui o antigo resumo "Hoje" — mesmo papel
// (leva a Nutrição), mas agora com o anel de progresso e um sinal de estado
// (macro no alvo / acima da meta) em vez de só um número.
function nutritionHeroCard(totals, profile){
  const calGoal = Number(profile.calorie_goal) || 0;
  const proteinGoal = Number(profile.protein_goal) || 0;
  const remaining = calGoal - totals.calories;
  const pct = calGoal > 0 ? (totals.calories / calGoal) * 100 : 0;
  const mealsToday = state.meals.filter(m => m.date === todayISO()).length;

  let status = null;
  if (calGoal > 0 && totals.calories > calGoal) {
    status = { color: '#f87171', label: 'Calorias acima da meta' };
  } else if (proteinGoal > 0 && totals.protein >= proteinGoal) {
    status = { color: '#34d399', label: 'Proteína no alvo' };
  } else if (proteinGoal > 0) {
    status = { color: '#fbbf24', label: `Faltam ${(proteinGoal - totals.protein).toFixed(0)}g de proteína` };
  }

  const mealsLabel = `${mealsToday} refeiç${mealsToday === 1 ? 'ão' : 'ões'} registada${mealsToday === 1 ? '' : 's'} hoje`;
  const desc = calGoal > 0
    ? `${mealsLabel}. Estás a ${Math.round(Math.min(100, pct))}% da meta diária.`
    : `${mealsLabel}. Define a tua meta no Perfil.`;

  return `
    <button onclick="switchVertical('nutricao')"
      class="w-full text-left rounded-3xl p-5 active:scale-[0.99] transition" style="${statCardBg('var(--accent)')}">
      <p class="text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-4">Hoje · Nutrição</p>
      <div class="flex items-center gap-5">
        <div class="relative shrink-0" style="width:104px;height:104px;">
          ${ringSvg(pct, { size: 104, stroke: 9 })}
          <div class="absolute inset-0 flex flex-col items-center justify-center">
            <span class="text-2xl font-extrabold text-white leading-none">${totals.calories.toFixed(0)}</span>
            <span class="text-[9px] font-semibold text-slate-500 uppercase tracking-wide mt-1">${calGoal > 0 ? `de ${calGoal.toFixed(0)} kcal` : 'kcal'}</span>
          </div>
        </div>
        <div class="min-w-0 flex-1">
          <p class="text-lg font-bold text-white leading-tight">${calGoal > 0
            ? (remaining >= 0 ? `Restam ${remaining.toFixed(0)} kcal` : `${Math.abs(remaining).toFixed(0)} kcal acima`)
            : 'Sem meta definida'}</p>
          <p class="text-xs text-slate-400 mt-1.5 leading-relaxed">${desc}</p>
          ${status ? `
            <p class="flex items-center gap-1.5 mt-2.5 text-xs font-semibold" style="color:${status.color}">
              <span class="w-1.5 h-1.5 rounded-full shrink-0" style="background:${status.color}"></span> ${status.label}
            </p>` : ''}
        </div>
      </div>
    </button>`;
}

// Mini-cartão do Corpo (peso / gordura corporal / etc.) — anel de progresso.
// Todas estas métricas têm um objetivo definível pelo utilizador no Perfil,
// e o anel mede exatamente isso (proximidade ao objetivo) — o formato certo
// para uma dimensão com meta, ao contrário de módulos sem meta real (ver
// gaugeBar, usado onde um anel não teria o mesmo significado).
function bodyMiniStatCard(m, latestVal, prevVal, goal){
  const hasVal = latestVal !== null && latestVal !== undefined;
  const hasGoal = hasVal && goal !== null && goal !== undefined && isFinite(goal) && goal > 0;
  const pct = hasGoal ? Math.max(0, Math.min(100, 100 - Math.abs(latestVal - goal) / goal * 100)) : 0;

  const delta = (prevVal !== null && prevVal !== undefined) ? (latestVal - prevVal) : null;
  const improving = delta !== null && m.good !== null ? (m.good === 'up' ? delta > 0 : delta < 0) : null;
  const deltaColor = improving === null ? 'text-slate-500' : improving ? 'text-emerald-400' : 'text-red-400';
  const deltaArrow = delta === null ? '' : (delta > 0 ? '▲' : delta < 0 ? '▼' : '•');

  return `
    <button onclick="switchVertical('corpo')" class="text-left rounded-2xl p-3.5 active:scale-[0.98] transition" style="${statCardBg(m.color)}">
      <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wide mb-2 truncate">${m.label}</p>
      <div class="flex items-center gap-3">
        <div class="relative shrink-0" style="width:52px;height:52px;">
          ${ringSvg(hasGoal ? pct : 0, { size: 52, stroke: 5, color: m.color })}
        </div>
        <div class="min-w-0">
          <p class="text-base font-extrabold text-white leading-none">${hasVal ? fmtMetric(m, latestVal) : '—'}</p>
          <p class="text-[10px] text-slate-500 mt-1 truncate">${hasGoal ? `meta ${fmtMetric(m, goal)}` : 'Sem objetivo'}</p>
          ${delta !== null ? `<p class="text-[10px] font-semibold ${deltaColor} mt-0.5">${deltaArrow} ${Math.abs(delta).toFixed(m.dec)}${m.unit}</p>` : ''}
        </div>
      </div>
    </button>`;
}

// Cartão do Ginásio: nº de sessões concluídas esta semana (0 para quem não
// tem a beta ativa — o módulo continua bloqueado, mas o cartão fica visível
// a todos por indicação explícita).
// Cartão do Ginásio (Sessões): tira de 7 dias (estilo "streak" de calendário)
// em vez de anel — a mesma informação (treinou ou não em cada dia) lê-se
// muito mais depressa numa tira do que num anel percentual, e dá variedade
// visual à grelha (nem tudo tem de ser um anel).
// Datas (Dom→Sáb) e iniciais da semana de calendário atual — partilhado por
// todos os cartões do Início que mostram um valor por dia desta semana.
function currentWeekDates(){
  const sunday = new Date(); sunday.setDate(sunday.getDate() - sunday.getDay());
  const dates = Array.from({ length: 7 }, (_, i) => { const d = new Date(sunday); d.setDate(d.getDate() + i); return d.toISOString().slice(0, 10); });
  return { dates, labels: ['D', 'S', 'T', 'Q', 'Q', 'S', 'S'] };
}
function gymSessionsCard(){
  const sessions = gymSessionsInRange('semana');
  const trainedDates = new Set(sessions.map(s => s.date));
  const { dates: days, labels } = currentWeekDates();
  const todayStr = todayISO();

  return `
    <button onclick="switchVertical('ginasio')" class="w-full text-left rounded-2xl p-3.5 active:scale-[0.98] transition" style="${statCardBg('#6366f1')}">
      <div class="flex items-center justify-between mb-3">
        <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wide">Ginásio · Esta semana</p>
        <p class="text-xs font-bold text-white">${sessions.length} ${sessions.length === 1 ? 'sessão' : 'sessões'}</p>
      </div>
      <div class="flex items-center gap-1.5">
        ${days.map((d, i) => {
          const trained = trainedDates.has(d);
          const isToday = d === todayStr;
          return `
            <div class="flex flex-col items-center gap-1 flex-1">
              <div class="w-full aspect-square rounded-lg flex items-center justify-center"
                style="${trained ? 'background:linear-gradient(135deg,#1e3a8a,#6366f1)' : ('background:' + emptyFillColor()) + (isToday ? ';box-shadow:inset 0 0 0 1.5px #6366f1' : '')}">
                ${trained ? '<i data-lucide="check" class="w-3.5 h-3.5 text-white"></i>' : ''}
              </div>
              <span class="text-[9px] ${isToday ? 'text-white font-bold' : 'text-slate-600'}">${labels[i]}</span>
            </div>`;
        }).join('')}
      </div>
    </button>`;
}

// Cartão opcional: volume total (kg) levantado esta semana, com barras
// diárias (Dom→Sáb) e a inicial do dia por baixo — mesmo tratamento do
// cartão "Ginásio · Esta semana" (streak), mas cada barra é o volume desse
// dia em vez de um check de treino feito/não feito.
function gymVolumeMiniCard(){
  const { dates: days, labels } = currentWeekDates();
  const byDay = {};
  gymSessions.forEach(s => { byDay[s.date] = (byDay[s.date] || 0) + sessionVolume(s); });
  const perDay = days.map(d => byDay[d] || 0);
  const thisWeek = perDay.reduce((a, b) => a + b, 0);

  const lastSunday = new Date(days[0]); lastSunday.setDate(lastSunday.getDate() - 7);
  const lastSaturday = new Date(days[0]); lastSaturday.setDate(lastSaturday.getDate() - 1);
  const lastWeekStart = lastSunday.toISOString().slice(0, 10), lastWeekEnd = lastSaturday.toISOString().slice(0, 10);
  const lastWeek = gymSessions.filter(s => s.date >= lastWeekStart && s.date <= lastWeekEnd).reduce((sum, s) => sum + sessionVolume(s), 0);
  const trend = thisWeek - lastWeek;
  const trendColor = trend > 0 ? 'text-emerald-400' : trend < 0 ? 'text-red-400' : 'text-slate-500';
  const trendArrow = trend > 0 ? '▲' : trend < 0 ? '▼' : '•';
  const maxDay = Math.max(...perDay, 1);
  const todayStr = todayISO();

  return `
    <button onclick="switchVertical('ginasio')" class="w-full text-left rounded-2xl p-3.5 active:scale-[0.98] transition" style="${statCardBg('#6366f1')}">
      <div class="flex items-center justify-between mb-1">
        <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wide">Ginásio · Volume</p>
        ${gymSessions.length ? `<span class="text-[10px] font-semibold ${trendColor}">${trendArrow} ${Math.round(Math.abs(trend))} kg</span>` : ''}
      </div>
      <p class="text-2xl font-extrabold text-white leading-none">${Math.round(thisWeek)}<span class="text-xs font-semibold text-slate-500"> kg</span></p>
      <p class="text-[10px] text-slate-500 mt-1 mb-3">esta semana · semana passada abaixo</p>
      <div class="flex items-end gap-1.5" style="height:28px;">
        ${perDay.map(kg => `<div class="flex-1 rounded-sm" style="height:${kg > 0 ? Math.max(4, kg / maxDay * 28) : 3}px;background:${kg > 0 ? '#6366f1' : emptyFillColor()}"></div>`).join('')}
      </div>
      <div class="flex items-center gap-1.5 mt-1">
        ${days.map((d, i) => `<span class="flex-1 text-center text-[9px] ${d===todayStr?'text-white font-bold':'text-slate-600'}">${labels[i]}</span>`).join('')}
      </div>
    </button>`;
}

// Cartão opcional: macro específico de hoje (Proteína/Hidratos/Gordura) —
// anel de progresso: tem meta real definida no Perfil, tal como o Corpo, por
// isso o anel (proximidade à meta) volta a ser a leitura mais direta aqui.
function nutrientMiniCard(nutrientKey, label, color, totals, profile){
  const goal = Number(profile[nutrientKey + '_goal']) || 0;
  const value = totals[nutrientKey] || 0;
  const hasGoal = goal > 0;
  const pct = hasGoal ? (value / goal) * 100 : 0;
  return `
    <button onclick="switchVertical('nutricao')" class="text-left rounded-2xl p-3.5 active:scale-[0.98] transition" style="${statCardBg(color)}">
      <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wide mb-2 truncate">${label}</p>
      <div class="flex items-center gap-3">
        <div class="relative shrink-0" style="width:52px;height:52px;">
          ${ringSvg(hasGoal ? pct : 0, { size: 52, stroke: 5, color })}
        </div>
        <div class="min-w-0">
          <p class="text-base font-extrabold text-white leading-none">${value.toFixed(0)}<span class="text-xs font-semibold text-slate-500">g</span></p>
          <p class="text-[10px] text-slate-500 mt-1 truncate">${hasGoal ? `meta ${goal.toFixed(0)}g` : 'Sem meta'}</p>
        </div>
      </div>
    </button>`;
}

// Cartão da Corrida: distância desta semana (Dom→Sáb), barras diárias com a
// inicial do dia por baixo — mesmo tratamento visual do "Ginásio · Volume"
// e do "Ginásio · Esta semana".
function kmHomeCard(){
  const { dates: days, labels } = currentWeekDates();
  const perDay = days.map(d => totalKm(runs.filter(r => r.date === d)));
  const weekKm = perDay.reduce((a, b) => a + b, 0);
  const monthKm = totalKm(runsInRange('mes'));

  const lastSunday = new Date(days[0]); lastSunday.setDate(lastSunday.getDate() - 7);
  const lastSaturday = new Date(days[0]); lastSaturday.setDate(lastSaturday.getDate() - 1);
  const lastWeekKm = totalKm(runs.filter(r => r.date >= lastSunday.toISOString().slice(0, 10) && r.date <= lastSaturday.toISOString().slice(0, 10)));
  const trend = weekKm - lastWeekKm;
  const trendColor = trend > 0 ? 'text-emerald-400' : trend < 0 ? 'text-red-400' : 'text-slate-500';
  const trendArrow = trend > 0 ? '▲' : trend < 0 ? '▼' : '•';
  const maxDay = Math.max(...perDay, 0.1);
  const todayStr = todayISO();

  return `
    <button onclick="switchVertical('corrida')" class="w-full text-left rounded-2xl p-3.5 active:scale-[0.98] transition" style="${statCardBg('#f97316')}">
      <div class="flex items-center justify-between mb-1">
        <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wide">Corrida · Distância</p>
        ${runs.length ? `<span class="text-[10px] font-semibold ${trendColor}">${trendArrow} ${Math.abs(trend).toFixed(1)} km</span>` : ''}
      </div>
      <p class="text-2xl font-extrabold text-white leading-none">${weekKm.toFixed(1)}<span class="text-xs font-semibold text-slate-500"> km</span></p>
      <p class="text-[10px] text-slate-500 mt-1 mb-3">esta semana · ${monthKm.toFixed(1)} km este mês</p>
      <div class="flex items-end gap-1.5" style="height:28px;">
        ${perDay.map(km => `<div class="flex-1 rounded-sm" style="height:${km > 0 ? Math.max(4, km / maxDay * 28) : 3}px;background:${km > 0 ? '#f97316' : emptyFillColor()}"></div>`).join('')}
      </div>
      <div class="flex items-center gap-1.5 mt-1">
        ${days.map((d, i) => `<span class="flex-1 text-center text-[9px] ${d===todayStr?'text-white font-bold':'text-slate-600'}">${labels[i]}</span>`).join('')}
      </div>
    </button>`;
}
// Escala fixa de referência (3:00/km = ritmo muito rápido → 100%; 8:00/km =
// ritmo de caminhada/corrida ligeira → 0%) para o anel ter sempre um
// preenchimento com significado, sem precisar de um objetivo definido pelo
// utilizador (ao contrário do Peso/Gordura corporal, que usam a meta do
// Perfil). Cada bucket (5km/10km/21km) fica com a sua barra de progresso —
// a mesma família visual dos macros da Nutrição, em vez de mais um anel.
function paceQualityPct(paceSec){
  const FAST = 180, SLOW = 480;
  return Math.max(0, Math.min(100, (SLOW - paceSec) / (SLOW - FAST) * 100));
}
// Cartão da Corrida: melhor pace de sempre aos 5/10/21 km — não o pace da
// corrida mais recente, o recorde pessoal em cada bucket (ver bestPaceData).
function paceHomeCard(){
  const b5 = bestPaceData(5);
  const b10 = bestPaceData(10);
  const b21 = bestPaceData(21);
  const bucket = (label, b) => {
    if (!b) return `
      <div class="flex-1 min-w-0">
        <div class="flex items-baseline justify-between gap-2">
          <p class="text-[10px] text-slate-500">${label}</p>
          <p class="text-xs text-slate-600">Sem dados</p>
        </div>
        ${gaugeBar(0, { color: '#f97316' })}
      </div>`;
    return `
      <div class="flex-1 min-w-0">
        <div class="flex items-baseline justify-between gap-2 mb-1">
          <p class="text-[10px] text-slate-500">${label}</p>
          <p class="text-sm font-extrabold text-white leading-none">${formatPace(b.pace)}</p>
        </div>
        ${gaugeBar(paceQualityPct(b.pace), { color: '#f97316' })}
      </div>`;
  };
  return `
    <button onclick="switchVertical('corrida')" class="w-full text-left rounded-2xl p-3.5 active:scale-[0.98] transition" style="${statCardBg('#f97316')}">
      <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wide mb-2.5">Corrida · Melhor pace</p>
      <div class="flex items-start gap-3">
        ${bucket('5 km+', b5)}
        ${bucket('10 km+', b10)}
        ${bucket('21 km+', b21)}
      </div>
    </button>`;
}

// Vai diretamente para a Agenda de provas (não o Registo) — usado pelo

// Cartão "Próxima Prova": contagem decrescente para a prova agendada mais

    .filter(e => e.status !== 'concluida' && e.date >= todayIso)

  const color = '#eab308';

      <button onclick="goToCorridaAgenda()" class="w-full text-left rounded-2xl p-3.5 active:scale-[0.98] transition" style="${statCardBg(color)}">
        <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wide mb-2">Próxima Prova</p>
        <div class="flex items-center gap-2.5">
          <span class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0" style="background:${color}1a;">
            <i data-lucide="flag" class="w-4 h-4" style="color:${color}"></i>
          </span>
          <p class="text-xs text-slate-500">Sem provas agendadas — toca para adicionar uma na Agenda.</p>
        </div>
      </button>`;
  }

  const daysUntil = Math.round((new Date(next.date + 'T00:00:00') - new Date(todayIso + 'T00:00:00')) / 86400000);
  const typeLabel = (RACE_TYPES.find(t => t.key === next.race_type) || {}).label || next.race_type;
  const countLabel = daysUntil === 0 ? 'Hoje!' : daysUntil === 1 ? '1 dia' : `${daysUntil} dias`;
  const countColor = daysUntil === 0 ? '#ef4444' : daysUntil <= 7 ? '#f97316' : '#fff';

    <button onclick="goToCorridaAgenda()" class="w-full text-left rounded-2xl p-3.5 active:scale-[0.98] transition" style="${statCardBg(color)}">
      <div class="flex items-center justify-between mb-1.5">
        <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wide">Próxima Prova</p>
        <span class="text-[9px] font-semibold px-1.5 py-0.5 rounded-full" style="background:${color}1a;color:${color}">${esc(typeLabel)}</span>
      </div>
      <div class="flex items-end justify-between gap-2">
        <div class="min-w-0">
          <p class="text-sm font-bold text-white truncate">${esc(next.name)}</p>
          <p class="text-[10px] text-slate-500 mt-0.5 truncate">${formatDatePT(next.date)}${next.location ? ` · ${esc(next.location)}` : ''}</p>
        </div>
        <div class="text-right shrink-0">
          <p class="text-xl font-extrabold leading-none" style="color:${countColor}">${countLabel}</p>
        </div>
      </div>
    </button>`;
}

// Cartões ativos (o utilizador só escolhe QUAIS, não a ordem — ver
// CANONICAL_HOME_ORDER) devolvidos sempre pela mesma ordem fixa, agrupada
// por módulo. Chaves desconhecidas (ex.: de uma versão futura/antiga) são
// ignoradas em vez de rebentar o render.
function currentHomeLayout(){
  const saved = state.profile && Array.isArray(state.profile.home_layout) ? state.profile.home_layout : null;
  const activeSet = new Set((saved && saved.length) ? saved : DEFAULT_HOME_LAYOUT);
  return CANONICAL_HOME_ORDER.filter(k => activeSet.has(k));
}

async function saveHomeLayout(next){
  if (!state.profile) return;
  const prevLayout = state.profile.home_layout;
  state.profile.home_layout = next;
  render();
  try {
    const { error } = await sb.from('profiles').update({ home_layout: next }).eq('id', currentUser.id);
    if (error) throw error;
  } catch(e) {
    state.profile.home_layout = prevLayout;
    flashSyncError(e);
    render();
  }
}
function toggleHomeCard(key){
  const active = new Set(currentHomeLayout());
  if (active.has(key)) active.delete(key); else active.add(key);
  // Guarda-se um array (esquema simples), mas a ordem de exibição vem sempre
  // de CANONICAL_HOME_ORDER — o array aqui é só o conjunto de chaves ativas.
  saveHomeLayout(CANONICAL_HOME_ORDER.filter(k => active.has(k)));
}
function toggleHomeEditMode(){
  homeEditMode = !homeEditMode;
  render();
}

// Mapa key → HTML já renderizado para cada cartão opcional (calculado uma
// vez por render a partir dos dados atuais, e depois filtrado/ordenado pela
// disposição escolhida pelo utilizador).
function buildHomeCardsMap(totals, profile){
  // Cada avaliação pode não preencher todas as métricas (ex.: só peso numa
  // pesagem rápida), por isso cada cartão procura a sua própria última
  // medição — não apenas a última avaliação, que pode não ter esse campo.
  const lastTwoForMetric = key => {
    const vals = [];
    for (const a of bodyAssessments) {
      if (a[key] !== null && a[key] !== undefined) {
        vals.push(a[key]);
        if (vals.length === 2) break;
      }
    }
    return [vals[0] ?? null, vals[1] ?? null];
  };
  const bodyCard = key => {
    const m = BODY_METRICS.find(x => x.key === key);
    const [latestVal, prevVal] = lastTwoForMetric(key);
    return bodyMiniStatCard(m, latestVal, prevVal, bodyGoal(m));
  };
  return {
    weight_kg: bodyCard('weight_kg'),
    body_fat_pct: bodyCard('body_fat_pct'),
    bmi: bodyCard('bmi'),
    muscle_mass_kg: bodyCard('muscle_mass_kg'),
    body_water_pct: bodyCard('body_water_pct'),
    protein_today: nutrientMiniCard('protein', 'Proteína hoje', '#a78bfa', totals, profile),
    carbs_today: nutrientMiniCard('carbs', 'Hidratos hoje', '#38bdf8', totals, profile),
    fat_today: nutrientMiniCard('fat', 'Gordura hoje', '#fb923c', totals, profile),
    gym_sessions: gymSessionsCard(),
    gym_volume: gymVolumeMiniCard(),
    corrida_km: kmHomeCard(),
    corrida_pace: paceHomeCard(),
  };
}

// Painel de "Personalizar Início": os 12 cartões opcionais agrupados por
// módulo, cada um com um interruptor para ativar/desativar. A ordem de
// exibição é sempre fixa (CANONICAL_HOME_ORDER) — só a seleção é do
// utilizador, por isso não há setas nem drag aqui.
function homeCardRow(d, active){
  // "footprints" (pés) não tem equivalente de ténis no set base da lucide —
  // ver sneakerIcon() — por isso este cartão usa o SVG inline em vez de
  // data-lucide como os restantes.
  const icon = d.icon === 'footprints'
    ? sneakerIcon('w-4 h-4 text-slate-400 shrink-0')
    : `<i data-lucide="${d.icon}" class="w-4 h-4 text-slate-400 shrink-0"></i>`;
  return `
    <div class="flex items-center gap-2 bg-neutral-900/60 border border-neutral-800 rounded-xl px-2.5 py-2">
      ${icon}
      <span class="text-xs text-white flex-1 truncate">${d.label}</span>
      <button onclick="toggleHomeCard('${d.key}')" type="button"
        class="w-9 h-5 rounded-full relative transition shrink-0 ${active ? 'bg-[var(--accent)]' : 'bg-neutral-700'}">
        <span class="absolute top-0.5 ${active ? 'left-4' : 'left-0.5'} w-4 h-4 rounded-full bg-white transition-all"></span>
      </button>
    </div>`;
}
function renderHomeEditPanel(){
  const activeSet = new Set(currentHomeLayout());
  const modules = [...new Set(HOME_CARD_DEFS.map(d => d.module))];

  return `
    <div class="rounded-2xl p-4" style="${statCardBg('var(--accent)')}">
      <div class="flex items-center justify-between mb-1">
        <h2 class="text-sm font-bold text-white">Personalizar Início</h2>
        <button onclick="toggleHomeEditMode()" class="text-xs font-semibold text-[var(--accent)]">Concluir</button>
      </div>
      <p class="text-[11px] text-slate-500 mb-3 leading-relaxed">Escolhe os cartões que queres ver. A posição é sempre agrupada por módulo — o cartão de calorias é sempre o primeiro e não se pode desativar.</p>

      ${modules.map(mod => `
        <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wide mb-1.5">${mod}</p>
        <div class="space-y-1.5 mb-3">
          ${HOME_CARD_DEFS.filter(d => d.module === mod).map(d => homeCardRow(d, activeSet.has(d.key))).join('')}
        </div>`).join('')}
    </div>`;
}

function renderHome(){
  const totals = rangeTotals('hoje');
  const profile = state.profile || {};
  const cardsMap = buildHomeCardsMap(totals, profile);
  const layout = currentHomeLayout();

  return `
    <div class="space-y-4 fade-in">
      <div class="flex items-center justify-between">
        <p class="text-[11px] font-semibold text-slate-500 uppercase tracking-wide">Início</p>
        <button onclick="toggleHomeEditMode()" type="button" class="flex items-center gap-1 text-[11px] font-semibold text-slate-400 border border-neutral-800 rounded-full px-2.5 py-1 active:scale-95 transition">
          <i data-lucide="sliders-horizontal" class="w-3 h-3"></i> Personalizar
        </button>
      </div>

      ${nextRaceHomeCard()}

      ${nutritionHeroCard(totals, profile)}

      ${waterHomeCard()}

      ${homeEditMode ? renderHomeEditPanel() : `
        ${layout.length ? `
          <div class="grid grid-cols-2 gap-2.5" style="grid-auto-flow:dense;">
            ${layout.map(k => {
              const def = HOME_CARD_DEFS.find(d => d.key === k);
              const span = def && def.size === 'full' ? 'col-span-2' : '';
              // [&>*]: força o cartão (botão/div) lá dentro a preencher a
              // célula da grelha — sem isto, um <button> (inline-block por
              // omissão) encolhia para o conteúdo em vez de esticar como um
              // item de grid normal fazia antes deste wrapper existir.
              return `<div class="${span} [&>*]:w-full [&>*]:block">${cardsMap[k]}</div>`;
            }).join('')}
          </div>` : `
          <button onclick="toggleHomeEditMode()" type="button" class="w-full text-xs text-slate-500 border-2 border-dashed border-neutral-800 rounded-2xl py-6">
            Sem cartões ativos — toca em "Personalizar" para escolher.
          </button>`}
      `}
    </div>
  `;
}

/* ============================= CORRIDA (vertical) ============================= */
// Etiqueta curta do tipo de corrida para o cartão da lista e para o resumo do Coach.
function runKindLabel(r){
  if (r.kind === 'competicao') return 'Competição';
  if (r.kind === 'treino') return (RUN_TRAINING_TYPES.find(t => t.key === r.training_type) || {}).label || 'Treino';
  return null; // 'simples' não mostra etiqueta — é o caso comum, sem ruído visual
}

function runCard(r){
  const expanded = expandedRunId === r.id;
  const reanalyzing = reanalyzingRunId === r.id;
  const paths = r.photo_paths || [];
  const hasDistance = r.distance_km !== null && r.distance_km !== undefined;
  const hasDuration = r.duration_seconds !== null && r.duration_seconds !== undefined;
  const pace = (hasDistance && hasDuration) ? paceSecPerKm(r) : null;
  const splits = [[5, r.split_5k_seconds], [10, r.split_10k_seconds], [21, r.split_21k_seconds]]
    .filter(([, s]) => s !== null && s !== undefined)
    .map(([km, s]) => `${km}km ${formatDuration(s)}`);
  const kindLabel = runKindLabel(r);
  const d = r.details || {};

  const summaryParts = [
    hasDistance ? `${Number(r.distance_km).toFixed(2)} km` : null,
    hasDuration ? formatDuration(r.duration_seconds) : null,
    pace !== null ? formatPace(pace) : null,
  ].filter(Boolean);

  return `
    <div id="run-card-${r.id}" class="bg-neutral-900/60 border border-neutral-800 rounded-xl overflow-hidden">
      <button onclick="toggleRunExpand('${r.id}')" class="w-full flex items-center justify-between gap-2 p-3 text-left">
        <div class="min-w-0">
          <p class="text-xs font-semibold text-white flex items-center gap-1.5 flex-wrap">
            ${formatDatePT(r.date)}
            ${kindLabel ? `<span class="text-[9px] font-semibold px-1.5 py-0.5 rounded-full bg-[var(--accent)]/10 text-[var(--accent)] border border-[var(--accent)]/30">${esc(kindLabel)}</span>` : ''}
            ${paths.length>1 ? `<span class="text-[9px] text-slate-500 flex items-center gap-0.5"><i data-lucide="images" class="w-3 h-3"></i>${paths.length}</span>` : ''}
          </p>
          <p class="text-[11px] text-slate-500 mt-0.5">${summaryParts.length ? summaryParts.join(' · ') : 'Sem distância/duração registadas'}</p>
          ${splits.length ? `<p class="text-[10px] text-slate-600 mt-0.5">Splits: ${splits.join(' · ')}</p>` : ''}
        </div>
        <i data-lucide="${expanded?'chevron-up':'chevron-down'}" class="w-4 h-4 text-slate-500 shrink-0"></i>
      </button>

      ${expanded ? `
      <div class="px-3 pb-3 space-y-2.5 border-t border-neutral-800 pt-2.5">
        ${paths.length ? `
          <div class="flex flex-wrap gap-2">
            ${paths.map(p => signedUrlCache[p]
              ? `<a href="${signedUrlCache[p]}" target="_blank" rel="noopener" class="shrink-0"><img src="${signedUrlCache[p]}" class="w-20 h-20 object-cover rounded-xl border border-neutral-800" alt="Print" /></a>`
              : signedUrlFailed[p]
                ? `<button onclick="loadRunPhotoUrls('${r.id}')" type="button" class="w-20 h-20 shrink-0 rounded-xl border border-red-500/30 bg-neutral-900 flex flex-col items-center justify-center text-red-400 text-[9px] gap-1 text-center px-1">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Tentar de novo
                  </button>`
                : `<div class="w-20 h-20 shrink-0 rounded-xl border border-neutral-800 bg-neutral-900 flex items-center justify-center text-slate-600 text-xs"><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i></div>`
            ).join('')}
          </div>` : ''}

        ${r.kind === 'treino' && RUN_REPEAT_TRAINING_TYPES.has(r.training_type) ? `
          <div class="grid grid-cols-2 gap-1.5 text-[11px] text-slate-400">
            ${d.warmup_minutes ? `<span>Aquecimento: <span class="text-slate-200">${d.warmup_minutes} min</span></span>` : ''}
            ${d.reps_count ? `<span>Repetições: <span class="text-slate-200">${d.reps_count}</span></span>` : ''}
            ${d.rep_distance_m ? `<span>Distância/rep.: <span class="text-slate-200">${d.rep_distance_m} m</span></span>` : ''}
            ${d.recovery_seconds ? `<span>Recuperação: <span class="text-slate-200">${d.recovery_seconds} seg</span></span>` : ''}
          </div>` : ''}

        ${r.kind === 'competicao' ? `
          <div class="grid grid-cols-2 gap-1.5 text-[11px] text-slate-400">
            ${d.official_time_seconds ? `<span>Tempo oficial: <span class="text-slate-200">${formatDuration(d.official_time_seconds)}</span></span>` : ''}
            ${d.position ? `<span>Posição: <span class="text-slate-200">${d.position}º</span></span>` : ''}
          </div>` : ''}

        ${r.notes ? `<p class="text-[11px] text-slate-500"><span class="text-slate-400 font-medium">Obs.:</span> ${esc(r.notes)}</p>` : ''}

        <div class="flex items-center gap-2 pt-1">
          ${paths.length ? `
            <button onclick="reanalyzeRun('${r.id}')" ${reanalyzing ? 'disabled' : ''}
              class="flex-1 border border-neutral-700 hover:border-[var(--accent)]/50 text-slate-300 text-xs font-semibold rounded-xl py-2 flex items-center justify-center gap-1.5 transition disabled:opacity-40 ${reanalyzing?'analyzing':''}">
              ${reanalyzing
                ? '<i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i> A reanalisar...'
                : '<i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Reanalisar'}
            </button>
          ` : ''}
          <button onclick="deleteRun('${r.id}')"
            class="border border-red-500/30 text-red-400 hover:bg-red-500/10 text-xs font-semibold rounded-xl px-3 py-2 flex items-center justify-center gap-1.5 transition">
            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
          </button>
        </div>
      </div>` : ''}
    </div>`;
}

// Aviso sob um campo de split: só aparece quando a distância introduzida já
// ultrapassa a tolerância desse bucket (ver SPLIT_TOLERANCE) e o split ainda
// não foi preenchido — é o sinal de que, sem essa informação, a corrida não
// vai contar para o "melhor pace" desse bucket no Início.
function runSplitHint(minKm, draft){
  const distance = Number(runDistanceDraft);
  if (!(distance >= minKm) || distance <= minKm * SPLIT_TOLERANCE || String(draft).trim()) return '';
  return `<p class="text-[9px] text-amber-500/80 mt-1 leading-tight">Sem isto, não conta para o pace aos ${minKm}km.</p>`;
}

function selectRunKind(kind){
  runKind = kind;
  if (kind !== 'treino') runTrainingType = null;
  runDetailsDraft = {};
  refreshCorrida();
}
function selectRunTrainingType(type){
  runTrainingType = type;
  runDetailsDraft = {};
  refreshCorrida();
}
function updateRunDetail(key, value){ runDetailsDraft[key] = value; }

// Campos dinâmicos (Intervalos/Sprints) ou de competição, prontos para gravar
// em `details` jsonb — só inclui chaves preenchidas com valores válidos.
function buildRunDetailsPayload(){
  if (runKind === 'treino' && RUN_REPEAT_TRAINING_TYPES.has(runTrainingType)) {
    const d = {};
    RUN_REPEAT_DETAIL_FIELDS.forEach(f => {
      const v = Number(runDetailsDraft[f.key]);
      if (v > 0) d[f.key] = v;
    });
    return Object.keys(d).length ? d : null;
  }
  if (runKind === 'competicao') {
    const d = {};
    const officialMin = Number(runDetailsDraft.official_time_minutes);
    if (officialMin > 0) d.official_time_seconds = Math.round(officialMin * 60);
    const pos = Number(runDetailsDraft.position);
    if (pos > 0) d.position = pos;
    return Object.keys(d).length ? d : null;
  }
  return null;
}

  return `
    <div class="flex flex-wrap gap-1.5 mb-3">
      ${kinds.map(k => `
        <button onclick="selectRunKind('${k.key}')" type="button"
          class="border rounded-full px-3 py-1.5 text-[11px] font-medium transition ${runKind===k.key ? 'text-neutral-950 bg-[var(--accent)] border-transparent' : 'text-slate-300 border-neutral-700'}">
          ${k.label}
        </button>
      `).join('')}
    </div>

    ${runKind === 'treino' ? `
      <div class="mb-3">
        <label class="text-[11px] text-slate-500 mb-1 block">Tipo de treino</label>
        <select onchange="selectRunTrainingType(this.value)"
          class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-[var(--accent)]/60">
          <option value="">Escolhe o tipo…</option>
          ${RUN_TRAINING_TYPES.map(t => `<option value="${t.key}" ${runTrainingType===t.key?'selected':''}>${t.label}</option>`).join('')}
        </select>
      </div>
      ${RUN_REPEAT_TRAINING_TYPES.has(runTrainingType) ? `
        <div class="grid grid-cols-2 gap-2 mb-3">
          ${RUN_REPEAT_DETAIL_FIELDS.map(f => `
            <div>

    ${runKind === 'competicao' ? `

        <input type="number" min="0" step="1" placeholder="Posição (opcional)" value="${esc(runDetailsDraft.position || '')}"

      <p class="text-[10px] text-slate-600 -mt-2 mb-3">A duração abaixo é o tempo pessoal (medido por relógio/telemóvel) — o tempo oficial fica à parte.</p>
    ` : ''}
  `;
}

}

// Atualização in-place do ecrã da Corrida (sem sub-navegação própria),
// espelhando refreshBody/refreshGym.
function refreshCorrida(){
  const main = document.getElementById('tab-content');
  if (!main) return;
  main.innerHTML = renderCorrida();
  if (window.lucide) lucide.createIcons();
}

async function onRunPhotoSelected(input){
  const files = Array.from(input.files || []);
  input.value = '';
  if (!files.length) return;
  const remaining = MAX_PHOTOS - runPhotos.length;
  if (remaining <= 0) { showToast('error', null, `Máximo de ${MAX_PHOTOS} imagens.`); return; }
  for (const file of files.slice(0, remaining)) {
    try { runPhotos.push(await compressImage(file)); }
    catch(e) { console.warn('Falha a processar imagem', e); }
  }
  refreshCorrida();
}
function removeRunPhoto(index){ runPhotos.splice(index, 1); refreshCorrida(); }
function clearRunPhotos(){ runPhotos = []; refreshCorrida(); }

async function analyzeRun(){
  if (!runPhotos.length || analyzingRun) return;
  const date = document.getElementById('runDate').value || todayISO();
  analyzingRun = true;
  refreshCorrida();
  try {
    const { data, error } = await sb.functions.invoke('analyze-run', {
      body: {
        images: runPhotos.map(p => p.base64), mime_type: 'image/jpeg', date,
        kind: runKind, training_type: runKind === 'treino' ? runTrainingType : null,
        details: buildRunDetailsPayload(), notes: runNotesDraft.trim() || null,
      },
    });
    if (error) throw new Error(await edgeFunctionErrorMessage(error, 'Falha na análise.'));
    if (data && data.error) throw new Error(data.error);

    const run = data.run;
    runs.unshift(run);
    runs.sort((a,b) => b.date.localeCompare(a.date) || (b.created_at||'').localeCompare(a.created_at||''));
    runPhotos = [];
    expandedRunId = run.id;
    showToast('success', 'Corrida registada', `${formatDatePT(run.date)} · a IA leu os dados do print`);
    logEvent('success', 'run_analysis', null, { date: run.date, ...(data.usage || {}) });
  } catch(e) {
    console.error(e);
    const msg = e.message || 'Falha na análise. Tenta novamente.';
    showToast('error', null, msg);
    logEvent('error', 'run_analysis', msg);
  }
  analyzingRun = false;
  refreshCorrida();
}

// Espelha loadGymSessionPhotoUrls — bucket run-photos.
async function loadRunPhotoUrls(id){
  const r = runs.find(x => x.id === id);
  const allPaths = (r && r.photo_paths) || [];
  const paths = allPaths.filter(p => !signedUrlCache[p]);
  if (!paths.length) return;
  paths.forEach(p => { delete signedUrlFailed[p]; });
  try {
    const { data, error } = await sb.storage.from('run-photos').createSignedUrls(paths, 3600);
    if (error) throw error;
    const returned = new Set();
    (data || []).forEach(d => {
      if (d.signedUrl && d.path) { signedUrlCache[d.path] = d.signedUrl; returned.add(d.path); }
    });
    paths.forEach(p => { if (!returned.has(p)) signedUrlFailed[p] = true; });
  } catch(e) {
    console.warn('signed urls', e);
    paths.forEach(p => { signedUrlFailed[p] = true; });
  }
  if (expandedRunId === id) refreshCorrida();
}

async function submitNewRun(){
  if (savingRun) return;
  const dateEl = document.getElementById('runDate');
  const date = dateEl ? dateEl.value : runDate;
  const distance = Number(runDistanceDraft);
  const minutes = Number(runDurationDraft);
  const hasDistance = distance > 0;
  const hasDuration = minutes > 0;

  // Simples continua a exigir distância+duração (comportamento original);
  // treino/competição toleram ficar só com os campos dinâmicos preenchidos
  // (ex.: uma sessão de sprints pode não ter uma distância total única).
  if (!date) {
    showToast('error', null, 'Preenche a data.');
    return;
  }
  if (runKind === 'simples' && (!hasDistance || !hasDuration)) {
    showToast('error', null, 'Preenche a data, a distância e a duração com valores válidos.');
    return;
  }
  if ((runDistanceDraft.trim() && !hasDistance) || (runDurationDraft.trim() && !hasDuration)) {
    showToast('error', null, 'Distância e duração têm de ser valores válidos.');
    return;
  }
  if (runKind === 'treino' && !runTrainingType) {
    showToast('error', null, 'Escolhe o tipo de treino.');
    return;
  }

  const durationSeconds = hasDuration ? Math.round(minutes * 60) : null;

  // Splits opcionais: só fazem sentido se a corrida cobrir essa distância, e
  // nunca podem exceder a duração total nem estar fora de ordem (5km ≤ 10km ≤ 21km).
  const minutesToSeconds = v => { const n = Number(v); return n > 0 ? Math.round(n * 60) : null; };
  const split5k = hasDistance && distance >= 5 ? minutesToSeconds(runSplit5kDraft) : null;
  const split10k = hasDistance && distance >= 10 ? minutesToSeconds(runSplit10kDraft) : null;
  const split21k = hasDistance && distance >= 21 ? minutesToSeconds(runSplit21kDraft) : null;
  const splits = [split5k, split10k, split21k].filter(s => s !== null);
  const inOrder = splits.every((s, i) => i === 0 || s >= splits[i - 1]);
  if (!inOrder || (durationSeconds !== null && splits.some(s => s > durationSeconds))) {
    showToast('error', null, 'Os splits têm de estar por ordem (5km ≤ 10km ≤ 21km) e não podem exceder a duração total.');
    return;
  }

  savingRun = true;
  render();

  const notes = runNotesDraft.trim() || null;
  try {
    const { data, error } = await sb.from('runs').insert({
      user_id: currentUser.id, date,
      distance_km: hasDistance ? distance : null,
      duration_seconds: durationSeconds,
      notes,
      kind: runKind,
      training_type: runKind === 'treino' ? runTrainingType : null,
      details: buildRunDetailsPayload(),
      split_5k_seconds: split5k, split_10k_seconds: split10k, split_21k_seconds: split21k,
    }).select().single();
    if (error) throw error;
    runs.unshift(data);
    runs.sort((a, b) => b.date.localeCompare(a.date) || (b.created_at || '').localeCompare(a.created_at || ''));
    runDate = todayISO();
    runKind = 'simples';
    runTrainingType = null;
    runDetailsDraft = {};
    runDistanceDraft = '';
    runDurationDraft = '';
    runNotesDraft = '';
    runSplit5kDraft = '';
    runSplit10kDraft = '';
    runSplit21kDraft = '';
    showToast('success', 'Corrida registada', null);
  } catch (e) {
    showToast('error', null, e.message || 'Falha a gravar a corrida.');
  }
  savingRun = false;
  render();
}

async function deleteRun(id){
  const idx = runs.findIndex(r => r.id === id);

}

/* ============================= AVALIAÇÃO CORPORAL (vertical "Corpo") ============================= */
function findAssessmentById(id){ return bodyAssessments.find(a => a.id === id) || null; }

// Avaliação imediatamente anterior (mais antiga) a `a`, para comparar valores.
// bodyAssessments está ordenada por data desc, logo a anterior está a seguir.
function previousAssessment(a){
  const idx = bodyAssessments.findIndex(x => x.id === a.id);
  return (idx === -1) ? null : (bodyAssessments[idx + 1] || null);
}

function fmtMetric(m, v){
  if (v === null || v === undefined || v === '') return '—';
  const n = Number(v);
  if (!isFinite(n)) return '—';
  return n.toFixed(m.dec) + (m.unit ? ' ' + m.unit : '');
}

// Cor do delta consoante o sentido saudável da métrica (BODY_METRICS.good).
// Usado como fallback quando não há objetivo definido para a métrica.
function deltaClass(m, delta){
  if (!delta || m.good === null) return 'text-slate-400';
  const improving = m.good === 'up' ? delta > 0 : delta < 0;
  return improving ? 'text-emerald-400' : 'text-red-400';
}

// Objetivo do utilizador para uma métrica do Corpo (ou null se não definido).
function bodyGoal(m){
  const v = state.profile ? state.profile['goal_' + m.key] : null;
  return (v === null || v === undefined || v === '') ? null : Number(v);
}

// Cor da seta de evolução entre duas leituras. Com objetivo definido: compara
// a distância ao objetivo antes/depois — aproximar = verde, afastar =
// vermelho, mesma distância = neutro. Sem objetivo, cai no sentido genérico
// saudável da métrica (BODY_METRICS.good), como antes.
// Nota: a direção da seta (▲/▼) reflete sempre o sinal real da variação —
// só a COR depende de estar a aproximar-se ou a afastar-se do objetivo.
function deltaTrendClass(m, prevValue, latestValue){
  if (prevValue === null || prevValue === undefined || latestValue === null || latestValue === undefined) {
    return 'text-slate-400';
  }
  const goal = bodyGoal(m);
  const delta = Number(latestValue) - Number(prevValue);
  if (goal !== null) {
    const distPrev = Math.abs(Number(prevValue) - goal);
    const distLatest = Math.abs(Number(latestValue) - goal);
    if (distLatest < distPrev) return 'text-emerald-400';
    if (distLatest > distPrev) return 'text-red-400';
    return 'text-slate-400';
  }
  return deltaClass(m, delta);
}

// Seta de tendência (▲/▼) + diferença entre parêntesis com sinal, ambas na
// cor goal-aware de deltaTrendClass (ex.: "▲ (+0.5 kg)"). Devolve '' se não
// houver duas leituras comparáveis ou a diferença for irrelevante.
function deltaArrowLabel(m, prevValue, latestValue, sizeClass){
  if (prevValue === null || prevValue === undefined || latestValue === null || latestValue === undefined) return '';
  const d = Number(latestValue) - Number(prevValue);
  const threshold = m.dec === 0 ? 1 : 0.05;
  if (Math.abs(d) < threshold) return '';
  const cls = deltaTrendClass(m, prevValue, latestValue);
  const sign = d > 0 ? '+' : '-';
  const unit = m.unit ? ' ' + m.unit : '';
  return `<span class="font-semibold ${cls} ${sizeClass || ''}">${d > 0 ? '▲' : '▼'} (${sign}${Math.abs(d).toFixed(m.dec)}${unit})</span>`;
}

// Classes do badge para a etiqueta de estado que a Renpho mostra por métrica.
// Verde = dentro do normal; âmbar = ligeiramente fora / atenção; vermelho =
// muito fora. A cor sai das palavras da etiqueta (sem acentos), não da métrica.
function classificationStyle(label){
  const t = String(label).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  if (/(muito|obesid|obeso|perigos|critico|grave|severo)/.test(t))
    return 'bg-red-500/15 text-red-400 border-red-500/40';
  if (/(alto|baixo|elevado|acima|abaixo|insuficiente|sobrepeso|ligeir|magro|excesso|reduzid)/.test(t))
    return 'bg-amber-500/15 text-amber-400 border-amber-500/40';
  if (/(normal|media|medio|padr|saudav|otim|excelente|ideal|\bbom\b|\bboa\b|adequ)/.test(t))
    return 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30';
  return 'bg-neutral-800 text-slate-400 border-neutral-700';
}

// Pequeno badge com a classificação Renpho (ou '' se não existir).
function classificationBadge(assessment, key, extra){
  const label = assessment && assessment.classifications ? assessment.classifications[key] : null;
  if (!label) return '';
  return `<span class="text-[9px] font-semibold px-1.5 py-0.5 rounded-full border shrink-0 ${classificationStyle(label)} ${extra || ''}">${esc(label)}</span>`;
}

function switchBodyTab(tab){
  bodyTab = tab;
  render();
  pushNavState();
}

// Dispatcher do conteúdo da vertical Corpo consoante o separador ativo —
// espelha o if/else de dashboard/registar/calendario da Nutrição.
function renderBodyTabContent(){
  if (bodyTab === 'avaliar') return renderBodyAvaliar();
  if (bodyTab === 'calendario') return renderBodyCalendario();
  return renderBodyDashboard();
}

// Atualização in-place do conteúdo da vertical Corpo (sem tocar no header/strip),
// espelhando refreshDashboard da Nutrição.
function refreshBody(){
  const main = document.getElementById('tab-content');
  if (!main) return;
  main.innerHTML = renderBodyTabContent();
  if (window.lucide) lucide.createIcons();
  if (bodyTab === 'dashboard') requestAnimationFrame(renderBodyChart);
}

async function onBodyPhotoSelected(input){
  const files = Array.from(input.files || []);
  input.value = '';
  if (!files.length) return;
  const remaining = MAX_PHOTOS - bodyPhotos.length;
  if (remaining <= 0) { showToast('error', null, `Máximo de ${MAX_PHOTOS} imagens.`); return; }
  for (const file of files.slice(0, remaining)) {
    try { bodyPhotos.push(await compressImage(file)); }
    catch(e) { console.warn('Falha a processar imagem', e); }
  }
  refreshBody();
}

function removeBodyPhoto(index){ bodyPhotos.splice(index, 1); refreshBody(); }
function clearBodyPhotos(){ bodyPhotos = []; refreshBody(); }
function updateBodyNotes(value){ bodyNotes = value; }

async function analyzeBody(){
  if (!bodyPhotos.length || analyzingBody) return;
  const date = document.getElementById('bodyDate').value || todayISO();
  analyzingBody = true;
  refreshBody();
  try {
    const { data, error } = await sb.functions.invoke('analyze-body', {
      body: { images: bodyPhotos.map(p => p.base64), mime_type: 'image/jpeg', date, notes: bodyNotes || null },
    });
    if (error) throw new Error(await edgeFunctionErrorMessage(error, 'Falha na análise.'));
    if (data && data.error) throw new Error(data.error);

    const assessment = data.assessment;
    bodyAssessments.unshift(assessment);
    bodyAssessments.sort((a,b) => b.date.localeCompare(a.date) || (b.created_at||'').localeCompare(a.created_at||''));
    bodyPhotos = [];
    bodyNotes = '';
    expandedAssessmentId = assessment.id;
    showToast('success', 'Avaliação registada', `${formatDatePT(assessment.date)} · a IA leu e comentou os valores`,
      { actionLabel: 'Ver no Calendário', actionOnclick: `viewInBodyCalendar('${assessment.date}')` });
    logEvent('success', 'body_analysis', null, { date: assessment.date, ...(data.usage || {}) });
  } catch(e) {
    console.error(e);
    const msg = e.message || 'Falha na análise. Tenta novamente.';
    showToast('error', null, msg);
    logEvent('error', 'body_analysis', msg);
  }
  analyzingBody = false;
  refreshBody();
}

async function reanalyzeBody(id){
  if (reanalyzingAssessmentId) return;
  const a = findAssessmentById(id);
  if (!a) return;
  reanalyzingAssessmentId = id;
  refreshBody();
  try {
    const { data, error } = await sb.functions.invoke('analyze-body', {
      body: { assessment_id: id, notes: a.notes || null },
    });
    if (error) throw new Error(await edgeFunctionErrorMessage(error, 'Falha na reanálise.'));
    if (data && data.error) throw new Error(data.error);
    Object.assign(a, data.assessment);
    showToast('success', 'Avaliação reanalisada', null);
    logEvent('success', 'body_reanalysis', null, { date: a.date, ...(data.usage || {}) });
  } catch(e) {
    console.error(e);
    const msg = e.message || 'Falha na reanálise.';
    showToast('error', null, msg);
    logEvent('error', 'body_reanalysis', msg);
  }
  reanalyzingAssessmentId = null;
  refreshBody();
}

async function deleteBodyAssessment(id){
  const a = findAssessmentById(id);
  if (!a) return;
  bodyAssessments = bodyAssessments.filter(x => x.id !== id);
  if (expandedAssessmentId === id) expandedAssessmentId = null;
  refreshBody();
  try {
    if (a.photo_paths && a.photo_paths.length) await sb.storage.from('body-photos').remove(a.photo_paths);
    const { error } = await sb.from('body_assessments').delete().eq('id', id);
    if (error) throw error;
  } catch(e) { flashSyncError(e); }
}

async function toggleAssessmentExpand(id){
  const opening = expandedAssessmentId !== id;
  expandedAssessmentId = opening ? id : null;
  refreshBodyCalendarDayAssessments();
  if (opening) scrollCardIntoView(`assessment-card-${id}`);
  if (expandedAssessmentId) await loadAssessmentPhotoUrls(id);
}

// Espelha loadMealPhotoUrls — isolada para poder ser re-chamada a partir do
// botão "Tentar novamente" sem duplicar o fluxo de expandir/recolher.
async function loadAssessmentPhotoUrls(id){
  const a = findAssessmentById(id);
  const allPaths = (a && a.photo_paths) || [];
  const paths = allPaths.filter(p => !signedUrlCache[p]);
  if (!paths.length) return;
  paths.forEach(p => { delete signedUrlFailed[p]; });
  try {
    const { data, error } = await sb.storage.from('body-photos').createSignedUrls(paths, 3600);
    if (error) throw error;
    const returned = new Set();
    (data || []).forEach(d => {
      if (d.signedUrl && d.path) { signedUrlCache[d.path] = d.signedUrl; returned.add(d.path); }
    });
    paths.forEach(p => { if (!returned.has(p)) signedUrlFailed[p] = true; });
  } catch(e) {
    console.warn('signed urls', e);
    paths.forEach(p => { signedUrlFailed[p] = true; });
  }
  if (expandedAssessmentId === id) refreshBodyCalendarDayAssessments();
}

async function updateAssessmentMetric(id, key, rawValue){
  const a = findAssessmentById(id);
  if (!a) return;
  const trimmed = String(rawValue).trim();
  const value = trimmed === '' ? null : Math.max(0, Number(trimmed));
  if (value !== null && !isFinite(value)) return;
  a[key] = value;
  refreshBody();
  try {
    const { error } = await sb.from('body_assessments').update({ [key]: value }).eq('id', id);
    if (error) throw error;
  } catch(e) { flashSyncError(e); }
}

function selectBodyMetric(key){ selectedBodyMetric = key; refreshBody(); }

function renderAssessmentCard(a){
  const expanded = expandedAssessmentId === a.id;
  const prev = previousAssessment(a);
  const reanalyzing = reanalyzingAssessmentId === a.id;
  const filled = BODY_METRICS.filter(m => a[m.key] !== null && a[m.key] !== undefined);

  // Resumo de destaque (não expandido): peso + gordura + músculo, se existirem.
  const highlightKeys = ['weight_kg', 'body_fat_pct', 'muscle_mass_kg'];
  const highlights = highlightKeys
    .map(k => BODY_METRICS.find(m => m.key === k))
    .filter(m => a[m.key] !== null && a[m.key] !== undefined)
    .map(m => `<span class="text-[11px] text-slate-400">${m.label.split(' ')[0]} <span class="text-white font-semibold">${fmtMetric(m, a[m.key])}</span></span>`)
    .join('<span class="text-slate-700">·</span>');

  const metricRow = (m) => {
    const v = a[m.key];
    const pv = prev ? prev[m.key] : null;
    const delta = deltaArrowLabel(m, pv, v, 'text-[10px]');
    return `
      <div class="flex items-center justify-between gap-2 py-1.5 border-b border-neutral-900 last:border-0">
        <span class="text-xs text-slate-400 flex items-center gap-1.5 min-w-0">
          <span class="w-2 h-2 rounded-full shrink-0" style="background:${m.color}"></span>
          <span class="truncate">${m.label}</span>
          ${classificationBadge(a, m.key)}
        </span>
        <div class="flex items-center gap-2 shrink-0">
          ${delta}
          <div class="flex items-center gap-1">
            <input type="number" step="${m.dec === 0 ? '1' : '0.1'}" min="0" value="${v ?? ''}"
              onchange="updateAssessmentMetric('${a.id}', '${m.key}', this.value)"
              class="w-16 bg-neutral-900 border border-neutral-800 rounded-lg px-2 py-1 text-xs text-white text-right outline-none focus:border-[var(--accent)]/60" />
            <span class="text-[10px] text-slate-500 w-8">${m.unit || ''}</span>

  return `
    <div id="assessment-card-${a.id}" class="card rounded-2xl overflow-hidden">
      <button onclick="toggleAssessmentExpand('${a.id}')" class="w-full flex items-center gap-3 p-3.5 text-left">

        </div>
        <i data-lucide="chevron-${expanded ? 'up' : 'down'}" class="w-4 h-4 text-slate-500 shrink-0"></i>

      ${expanded ? `
        <div class="px-3.5 pb-3.5 space-y-3">

            <div class="rounded-xl bg-[var(--accent)]/5 border border-[var(--accent)]/20 p-3">

function renderBodyDashboard(){
  if (!bodyAssessments.length) {
    return `
      <div class="min-h-[50vh] flex flex-col items-center justify-center text-center px-6 fade-in">
        <span class="w-16 h-16 rounded-3xl flex items-center justify-center mb-4" style="background:linear-gradient(135deg,#5b21b6,#a855f7);">
          <i data-lucide="user" class="w-7 h-7 text-white"></i>
        </span>
        <p class="text-xs text-slate-500 max-w-xs leading-relaxed">Ainda não tens avaliações. Vai ao Calendário para enviar o teu primeiro print da Renpho Health.</p>
        <button onclick="switchBodyTab('calendario')" class="mt-4 bg-[var(--accent)] text-neutral-950 font-bold text-xs rounded-xl px-4 py-2.5 flex items-center gap-1.5 active:scale-[0.98] transition">
          <i data-lucide="calendar-days" class="w-4 h-4"></i> Ir para o Calendário
        </button>
      </div>`;
  }
  const m = BODY_METRICS.find(x => x.key === selectedBodyMetric) || BODY_METRICS[0];

  // Leituras da métrica selecionada, mais recente primeiro (bodyAssessments já
  // vem ordenada por data desc).
  const withVal = bodyAssessments.filter(a => a[m.key] !== null && a[m.key] !== undefined);
  const latest = withVal[0];
  const previous = withVal[1] || null;
  const goal = bodyGoal(m);

  // Seta de tendência: compara as duas leituras mais recentes. A cor indica
  // se a variação aproxima (verde) ou afasta (vermelho) do objetivo definido
  // — ou, sem objetivo, o sentido genérico saudável da métrica.
  const trendArrow = deltaArrowLabel(m, previous ? previous[m.key] : null, latest ? latest[m.key] : null, 'text-xs whitespace-nowrap');

  // Subtítulo: distância ao objetivo (se definido) ou nº de leituras.
  let subtitle;
  if (goal !== null && latest) {
    const dist = Math.abs(Number(latest[m.key]) - goal);
    subtitle = dist < (m.dec === 0 ? 1 : 0.05)
      ? `<span class="text-[11px] text-emerald-400 font-semibold">Objetivo atingido</span>`
      : `<span class="text-[11px] text-slate-500">Objetivo: <span class="text-slate-300 font-semibold">${fmtMetric(m, goal)}</span> · faltam ${dist.toFixed(m.dec)} ${m.unit}</span>`;
  } else {
    subtitle = `<span class="text-[11px] text-slate-500">${withVal.length} leitura(s)${goal===null ? ' · sem objetivo definido' : ''}</span>`;
  }

  const chips = BODY_METRICS.map(x => `
    <button onclick="selectBodyMetric('${x.key}')"
      class="shrink-0 border rounded-full px-3 py-1.5 text-[11px] font-medium transition ${selectedBodyMetric===x.key ? 'text-neutral-950 border-transparent' : 'text-slate-300 border-neutral-700'}"
      style="${selectedBodyMetric===x.key ? `background:${x.color};` : ''}">
      ${x.label}
    </button>
  `).join('');

  // Últimos valores de todas as métricas, com seta de tendência (goal-aware)
  // comparando as duas leituras mais recentes de cada uma.
  const latestGrid = BODY_METRICS.map(x => {
    const withValX = bodyAssessments.filter(as => as[x.key] !== null && as[x.key] !== undefined);
    const a = withValX[0];
    const prevA = withValX[1] || null;
    const badge = a ? classificationBadge(a, x.key, 'mt-1 inline-block') : '';
    const arrow = deltaArrowLabel(x, prevA ? prevA[x.key] : null, a ? a[x.key] : null, 'text-[10px]');
    return `
      <div class="card rounded-xl p-3">
        <p class="text-[10px] text-slate-500 truncate">${x.label}</p>
        <p class="text-sm font-bold text-white mt-0.5">${a ? fmtMetric(x, a[x.key]) : '—'}</p>
        ${arrow ? `<p class="mt-0.5">${arrow}</p>` : ''}
        ${badge}
      </div>`;
  }).join('');

  return `
    <div class="space-y-4">
      <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">${chips}</div>

      <div class="card rounded-2xl p-4">
        <div class="flex items-center justify-between gap-2 mb-1 flex-wrap">
          <div class="flex items-center gap-2 min-w-0">
            <span class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${m.color}"></span>
            <h2 class="text-sm font-semibold text-white truncate">${m.label}</h2>
          </div>
          <div class="flex items-center gap-1.5 shrink-0">
            ${latest ? `<span class="text-lg font-bold text-white">${fmtMetric(m, latest[m.key])}</span>` : ''}
            ${trendArrow}
          </div>
        </div>
        <div class="mb-3">${subtitle}</div>
        ${withVal.length >= 1 ? `<canvas id="bodyChart" height="190"></canvas>` : `<p class="text-xs text-slate-500">Sem leituras desta métrica ainda.</p>`}
      </div>

      <div class="flex items-center gap-2 px-1">
        <i data-lucide="list" class="w-4 h-4 text-[var(--accent)]"></i>
        <h2 class="text-sm font-semibold text-white">Valores mais recentes</h2>
      </div>
      <div class="grid grid-cols-3 gap-2">${latestGrid}</div>
    </div>
  `;
}

// Calendário da vertical Corpo — espelha renderCalendario da Nutrição.
// Não precisa de cache/carregamento por mês porque bodyAssessments já contém
// o histórico completo do utilizador (dataset muito mais pequeno que meals).
function renderBodyCalendario(){
  const [y, m] = bodyCalendarViewMonth.split('-').map(Number);
  const firstOfMonth = new Date(y, m - 1, 1);
  const daysInMonth = new Date(y, m, 0).getDate();
  const firstWeekday = (firstOfMonth.getDay() + 6) % 7; // 0 = Segunda
  const monthLabel = `${PT_MONTHS[m-1]} ${y}`;
  const todayIso = todayISO();

  const cells = Array(firstWeekday).fill(null);
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }

  return `
    <div class="space-y-4 fade-in">
      <button onclick="goToAvaliarForDate(bodyCalendarSelectedDate)"
        class="w-full bg-[var(--accent)] text-neutral-950 font-bold text-sm rounded-2xl py-3.5 flex items-center justify-center gap-2 active:scale-[0.98] transition shadow-lg">
        <i data-lucide="scan-line" class="w-5 h-5"></i> Nova Avaliação
      </button>

      <div class="card rounded-2xl p-4">
        <div class="flex items-center justify-between mb-4">
          <button onclick="changeBodyCalendarMonth(-1)" class="p-2 text-slate-400 hover:text-white">
            <i data-lucide="chevron-left" class="w-5 h-5"></i>
          </button>

// Resumo do dia selecionado: métricas que pioraram face à avaliação anterior
// (o motivo do ponto vermelho) — mostra qual métrica e o quanto, em vez de
// obrigar a comparar manualmente os "Valores mais recentes" contra o histórico.
function renderBodyCalendarDaySummary(){
  const dayAssessments = bodyAssessments.filter(a => a.date === bodyCalendarSelectedDate);
  if (dayAssessments.length === 0) return '';
  const worsened = dayAssessments.flatMap(bodyAssessmentWorsenedMetrics);
  if (worsened.length === 0) return '';

  return `
    <div class="rounded-2xl border border-red-500/30 bg-red-500/5 p-3.5 space-y-2">
      <p class="text-[11px] font-semibold text-red-300 uppercase tracking-wide flex items-center gap-1.5">
        <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> Afastou-se do objetivo neste dia
      </p>
      ${worsened.map(({ m, prevVal, latest }) => {
        const delta = Number(latest) - Number(prevVal);
        const arrow = delta > 0 ? '▲' : delta < 0 ? '▼' : '•';
        const goal = bodyGoal(m);
        return `
          <div class="flex items-center justify-between text-xs">
            <span class="text-red-300 font-semibold">${esc(m.label)}</span>
            <span class="text-red-300">${fmtMetric(m, latest)} <span class="text-red-300/70">(${arrow} ${Math.abs(delta).toFixed(m.dec)}${m.unit})</span>${goal !== null ? ` <span class="text-slate-500">· meta ${fmtMetric(m, goal)}</span>` : ''}</span>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// selecionado, sem recriar o calendário todo nem repetir a animação fade-in

function renderBodyCalendarDayAssessments(){

    .filter(a => a.date === bodyCalendarSelectedDate)
    .sort((a,b) => (a.created_at||'').localeCompare(b.created_at||''));
  if (dayAssessments.length === 0) return `<p class="text-xs text-slate-500 px-1">Sem avaliações registadas neste dia.</p>`;
  return dayAssessments.map(renderAssessmentCard).join('');

function renderBodyChart(){
  const canvas = document.getElementById('bodyChart');
  if (!canvas) return;
  if (bodyChart) { bodyChart.destroy(); bodyChart = null; }

  const m = BODY_METRICS.find(x => x.key === selectedBodyMetric) || BODY_METRICS[0];
  // Ordem cronológica ascendente, apenas avaliações com valor para a métrica.
  const points = bodyAssessments
    .filter(a => a[m.key] !== null && a[m.key] !== undefined)
    .slice()
    .sort((a,b) => a.date.localeCompare(b.date));
  if (!points.length) return;

  const goal = bodyGoal(m);
  const datasets = [{
    label: `${m.label}${m.unit ? ' (' + m.unit + ')' : ''}`,
    data: points.map(a => Number(a[m.key])),
    borderColor: m.color,
    backgroundColor: hexToRgba(m.color, 0.15),
    pointBackgroundColor: m.color,
    pointRadius: points.length > 20 ? 0 : 3,
    borderWidth: 2,
    tension: 0.25,
    fill: true,
  }];
  // Linha tracejada do objetivo — mesmo estilo da meta no dashboard da Nutrição.
  if (goal !== null) {
    datasets.push({
      label: 'Objetivo', data: points.map(() => goal),
      borderColor: '#ef4444', borderDash: [6,4], pointRadius: 0, borderWidth: 1.5,
    });
  }

  Chart.defaults.color = theme === 'light' ? '#475569' : '#a1a1aa';
  bodyChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: points.map(a => a.date.slice(8,10) + '/' + a.date.slice(5,7)),
      datasets,
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { boxWidth: 10, font: { size: 10 } } } },
      scales: {
        y: { beginAtZero: false, grid: { color: theme === 'light' ? 'rgba(154,116,74,0.45)' : 'rgba(232,163,66,0.3)' } },
        x: { grid: { display: false } },
      },
    },
  });
}

function findGymSessionById(id){ return gymSessions.find(s => s.id === id) || null; }

// Agrupa as séries de uma sessão por exercício, preservando a ordem de
// aparecimento e a ordem das séries dentro de cada exercício (set_index).
function gymSetGroups(session){
  const sets = (session.workout_session_sets || []).slice().sort((a,b) => (a.set_index||0) - (b.set_index||0));
  const order = [];
  const byName = {};
  sets.forEach(s => {
    if (!byName[s.exercise_name]) { byName[s.exercise_name] = []; order.push(s.exercise_name); }
    byName[s.exercise_name].push(s);
  });
  return order.map(name => ({ exercise_name: name, sets: byName[name] }));
}

async function onGymPhotoSelected(input){
  const files = Array.from(input.files || []);
  input.value = '';
  if (!files.length) return;
  const remaining = MAX_PHOTOS - gymPhotos.length;
  if (remaining <= 0) { showToast('error', null, `Máximo de ${MAX_PHOTOS} imagens.`); return; }
  for (const file of files.slice(0, remaining)) {
    try { gymPhotos.push(await compressImage(file)); }
    catch(e) { console.warn('Falha a processar imagem', e); }
  }
  refreshGym();
}

async function analyzeGym(){
  if (!gymPhotos.length || analyzingGym) return;
  const date = document.getElementById('gymDate').value || todayISO();
  analyzingGym = true;
  refreshGym();
  try {
    const { data, error } = await sb.functions.invoke('analyze-gym', {
      body: { images: gymPhotos.map(p => p.base64), mime_type: 'image/jpeg', date, notes: gymNotes || null },
    });
    if (error) throw new Error(await edgeFunctionErrorMessage(error, 'Falha na análise.'));
    if (data && data.error) throw new Error(data.error);

    const session = data.session;
    session.workout_session_sets = data.sets || [];
    gymSessions.unshift(session);
    gymSessions.sort((a,b) => b.date.localeCompare(a.date) || (b.created_at||'').localeCompare(a.created_at||''));
    gymPhotos = [];
    gymNotes = '';
    expandedGymSessionId = session.id;
    showToast('success', 'Sessão registada', `${formatDatePT(session.date)} · ${gymSetGroups(session).length} exercício(s)`,
      { actionLabel: 'Ver no Calendário', actionOnclick: `viewInGymCalendar('${session.date}')` });
    logEvent('success', 'gym_analysis', null, { date: session.date, ...(data.usage || {}) });
  } catch(e) {
    console.error(e);
    const msg = e.message || 'Falha na análise. Tenta novamente.';
    showToast('error', null, msg);
    logEvent('error', 'gym_analysis', msg);
  }
  analyzingGym = false;
  refreshGym();
}

async function reanalyzeGym(id){
  if (reanalyzingGymSessionId) return;
  const s = findGymSessionById(id);
  if (!s) return;
  reanalyzingGymSessionId = id;
  refreshGym();
  try {
    const { data, error } = await sb.functions.invoke('analyze-gym', {

    });
    if (error) throw new Error(await edgeFunctionErrorMessage(error, 'Falha na reanálise.'));

    showToast('success', 'Sessão reanalisada', null);

    const msg = e.message || 'Falha na reanálise.';
    showToast('error', null, msg);

async function deleteGymSession(id){

// Espelha loadAssessmentPhotoUrls — bucket gym-photos.
async function loadGymSessionPhotoUrls(id){
  const s = findGymSessionById(id);
  const allPaths = (s && s.photo_paths) || [];
  const paths = allPaths.filter(p => !signedUrlCache[p]);
  if (!paths.length) return;
  paths.forEach(p => { delete signedUrlFailed[p]; });
  try {
    const { data, error } = await sb.storage.from('gym-photos').createSignedUrls(paths, 3600);
    if (error) throw error;
    const returned = new Set();
    (data || []).forEach(d => {
      if (d.signedUrl && d.path) { signedUrlCache[d.path] = d.signedUrl; returned.add(d.path); }
    });
    paths.forEach(p => { if (!returned.has(p)) signedUrlFailed[p] = true; });
  } catch(e) {
    console.warn('signed urls', e);
    paths.forEach(p => { signedUrlFailed[p] = true; });
  }
  if (expandedGymSessionId === id) refreshGymCalendarDaySessions();
}

      { actionLabel: 'Ver no Calendário', actionOnclick: `viewInGymCalendar('${s.date}')` });
  }
  manualGymSessionId = null;

  newGymExerciseNameDraft = '';
  newGymSetRepsDraft = '';
  newGymSetWeightDraft = '';

// Adiciona uma série ao exercício indicado pelo nome (cria o exercício se for
// a primeira série com este nome). O nome do exercício mantém-se depois de
// gravar para facilitar adicionar várias séries seguidas do mesmo exercício.
async function submitGymSet(sessionId){
  if (addingGymSet) return;
  const name = newGymExerciseNameDraft.trim();
  const reps = Number(newGymSetRepsDraft);
  const weight = Number(newGymSetWeightDraft);
  if (!name || !(reps > 0) || !(weight >= 0)) {
    showToast('error', null, 'Preenche o exercício, as repetições e a carga com valores válidos.');
    return;
  }
  const s = findGymSessionById(sessionId);
  if (!s) return;
  const setIndex = (s.workout_session_sets || []).filter(x => x.exercise_name === name).length;

  addingGymSet = true;
  refreshGym();
  try {
    const { data, error } = await sb.from('workout_session_sets')
      .insert({ session_id: sessionId, user_id: currentUser.id, exercise_name: name, set_index: setIndex, reps, weight })
      .select().single();
    if (error) throw error;
    s.workout_session_sets = [...(s.workout_session_sets || []), data];
    newGymSetRepsDraft = '';
    newGymSetWeightDraft = '';
  } catch(e) {
    flashSyncError(e);
  }
  addingGymSet = false;
  refreshGym();
}

async function deleteGymSet(sessionId, setId){
  const s = findGymSessionById(sessionId);
  if (!s) return;
  s.workout_session_sets = (s.workout_session_sets || []).filter(x => x.id !== setId);
  refreshGym();
  try {
    const { error } = await sb.from('workout_session_sets').delete().eq('id', setId);
    if (error) throw error;
  } catch(e) { flashSyncError(e); }
}

// Cartão de sessão de treino — espelha renderMealCard/renderAssessmentCard.
// Expansível, fotos via URLs assinados, exercícios agrupados por nome com
// as respetivas séries (reps × carga), formulário inline "Nova Série".
function renderGymSessionCard(session){
  const expanded = expandedGymSessionId === session.id;
  const reanalyzing = reanalyzingGymSessionId === session.id;
  const paths = session.photo_paths || [];
  const groups = gymSetGroups(session);
  const volume = sessionVolume(session);
  const totalSets = (session.workout_session_sets || []).length;
  const showAddSetForm = manualGymSessionId === session.id;

  return `
    <div id="gym-session-card-${session.id}" class="card rounded-2xl overflow-hidden">
      <button onclick="toggleGymSessionExpand('${session.id}')" class="w-full flex items-center justify-between p-4 text-left">
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-9 h-9 rounded-xl bg-[var(--accent)]/10 border border-[var(--accent)]/30 flex items-center justify-center shrink-0">
            <i data-lucide="dumbbell" class="w-4 h-4 text-[var(--accent)]"></i>
          </div>
          <div class="min-w-0">
            <p class="text-xs font-semibold text-white flex items-center gap-1">${esc(session.name || 'Treino')}${paths.length>1?`<span class="text-[9px] text-slate-500 flex items-center gap-0.5"><i data-lucide="images" class="w-3 h-3"></i>${paths.length}</span>`:''}</p>
            <p class="text-[10px] text-slate-500">${formatDatePT(session.date)} · ${groups.length} exercício(s) · ${totalSets} série(s)</p>

        </div>
        <div class="flex items-center gap-2 shrink-0">
          <span class="text-xs font-bold text-[var(--accent)]">${Math.round(volume).toLocaleString('pt-PT')} kg</span>
          <i data-lucide="${expanded?'chevron-up':'chevron-down'}" class="w-4 h-4 text-slate-500"></i>
        </div>
      </button>

      ${expanded ? `
      <div class="px-4 pb-4 space-y-3 border-t border-neutral-800 pt-3">
        ${paths.length ? `
          <div class="flex flex-wrap gap-2">
            ${paths.map(p => signedUrlCache[p]
              ? `<a href="${signedUrlCache[p]}" target="_blank" rel="noopener" class="shrink-0"><img src="${signedUrlCache[p]}" class="w-20 h-20 object-cover rounded-xl border border-neutral-800" alt="Print" /></a>`
              : signedUrlFailed[p]
                ? `<button onclick="loadGymSessionPhotoUrls('${session.id}')" type="button" class="w-20 h-20 shrink-0 rounded-xl border border-red-500/30 bg-neutral-900 flex flex-col items-center justify-center text-red-400 text-[9px] gap-1 text-center px-1">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Falhou<br/>Tentar de novo
                  </button>`
                : `<div class="w-20 h-20 shrink-0 rounded-xl border border-neutral-800 bg-neutral-900 flex items-center justify-center text-slate-600 text-xs"><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i></div>`
            ).join('')}
          </div>` : ''}

        ${groups.length ? `
        <div class="space-y-2">
          ${groups.map(g => `
            <div class="bg-neutral-900/60 border border-neutral-800 rounded-xl p-3">
              <p class="text-xs font-semibold text-white mb-2">${esc(g.exercise_name)}</p>
              <div class="space-y-1">
                ${g.sets.map((s, i) => `
                  <div class="flex items-center justify-between text-[11px] text-slate-400">
                    <span>Série ${i+1}</span>
                    <span class="text-slate-300">${s.reps ?? '—'} reps × ${s.weight ?? '—'} kg</span>
                    ${showAddSetForm ? `
                      <button onclick="deleteGymSet('${session.id}', '${s.id}')" class="text-slate-600 hover:text-red-400 shrink-0">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                      </button>` : ''}
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>` : `<p class="text-xs text-slate-500">Ainda sem exercícios registados.</p>`}

        ${session.notes ? `<p class="text-[11px] text-slate-500"><span class="text-slate-400 font-medium">Obs.:</span> ${esc(session.notes)}</p>` : ''}

        ${showAddSetForm ? `
          <div class="bg-neutral-900/60 border border-[var(--accent)]/30 rounded-xl p-3 space-y-2">
            <p class="text-xs font-semibold text-[var(--accent)] flex items-center gap-1.5">
              <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i> Nova Série
            </p>
            <input id="newGymExerciseName" type="text" placeholder="Exercício (ex.: Supino)" value="${esc(newGymExerciseNameDraft)}"
              oninput="newGymExerciseNameDraft=this.value" list="gymKnownExercises" ${addingGymSet ? 'disabled' : ''}

            <div class="grid grid-cols-2 gap-2">
              <input id="newGymSetReps" type="number" min="0" step="1" placeholder="Repetições" value="${esc(newGymSetRepsDraft)}"
                oninput="newGymSetRepsDraft=this.value" ${addingGymSet ? 'disabled' : ''}
                class="w-full bg-neutral-950 border border-neutral-700 rounded-lg px-2 py-1.5 text-xs text-white placeholder-slate-600 outline-none focus:border-[var(--accent)]/60 disabled:opacity-50" />
              <input id="newGymSetWeight" type="number" min="0" step="0.5" placeholder="Carga (kg)" value="${esc(newGymSetWeightDraft)}"
                oninput="newGymSetWeightDraft=this.value" ${addingGymSet ? 'disabled' : ''}

            </div>
            <button onclick="submitGymSet('${session.id}')" ${addingGymSet ? 'disabled' : ''} type="button"
              class="w-full bg-[var(--accent)] text-neutral-950 text-xs font-bold rounded-lg py-2 flex items-center justify-center gap-1.5 disabled:opacity-60">
              ${addingGymSet
                ? '<i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i> A gravar...'
                : '<i data-lucide="check" class="w-3.5 h-3.5"></i> Adicionar Série'}
            </button>
          </div>
        ` : ''}

        <div class="flex items-center gap-2 pt-1">
          ${paths.length ? `
            <button onclick="reanalyzeGym('${session.id}')" ${reanalyzing ? 'disabled' : ''}
              class="flex-1 border border-neutral-700 hover:border-[var(--accent)]/50 text-slate-300 text-xs font-semibold rounded-xl py-2 flex items-center justify-center gap-1.5 transition disabled:opacity-40 ${reanalyzing?'analyzing':''}">
              ${reanalyzing
                ? '<i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i> A reanalisar...'
                : '<i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Reanalisar'}
            </button>
          ` : ''}
          <button onclick="deleteGymSession('${session.id}')"
            class="border border-red-500/30 text-red-400 hover:bg-red-500/10 text-xs font-semibold rounded-xl px-3 py-2 flex items-center justify-center gap-1.5 transition">
            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
          </button>
        </div>
      </div>
      ` : ''}
    </div>
  `;
}

/* ============================= CALENDÁRIO ============================= */
// Calendário da vertical Ginásio — espelha renderBodyCalendario. Não precisa
// de cache/carregamento por mês porque gymSessions já contém o histórico
// completo do utilizador.
function changeGymCalendarMonth(delta){
  gymCalendarViewMonth = shiftMonthKey(gymCalendarViewMonth, delta);
  render();
}
function selectGymCalendarDay(dateIso){
  gymCalendarSelectedDate = dateIso;
  render();
}
function dayGymStatus(dateIso){
  return gymSessions.some(s => s.date === dateIso) ? 'has' : 'none';
}

function renderGymCalendario(){
  const [y, m] = gymCalendarViewMonth.split('-').map(Number);
  const firstOfMonth = new Date(y, m - 1, 1);
  const daysInMonth = new Date(y, m, 0).getDate();
  const firstWeekday = (firstOfMonth.getDay() + 6) % 7; // 0 = Segunda
  const monthLabel = `${PT_MONTHS[m-1]} ${y}`;
  const todayIso = todayISO();

  const cells = Array(firstWeekday).fill(null);
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }

  return `
    <div class="space-y-4 fade-in">
      <button onclick="goToGymRegistarForDate(gymCalendarSelectedDate)"
        class="w-full bg-[var(--accent)] text-neutral-950 font-bold text-sm rounded-2xl py-3.5 flex items-center justify-center gap-2 active:scale-[0.98] transition shadow-lg">
        <i data-lucide="dumbbell" class="w-5 h-5"></i> Novo Treino
      </button>

      <div class="card rounded-2xl p-4">
        <div class="flex items-center justify-between mb-4">
          <button onclick="changeGymCalendarMonth(-1)" class="p-2 text-slate-400 hover:text-white">
            <i data-lucide="chevron-left" class="w-5 h-5"></i>
          </button>
          <h2 class="text-sm font-bold text-white capitalize">${monthLabel}</h2>
          <button onclick="changeGymCalendarMonth(1)" class="p-2 text-slate-400 hover:text-white">
            <i data-lucide="chevron-right" class="w-5 h-5"></i>
          </button>
        </div>

        <div class="grid grid-cols-7 gap-1 mb-1">
          ${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d => `<div class="text-center text-[10px] text-slate-600 font-semibold">${d}</div>`).join('')}
        </div>

        <div class="grid grid-cols-7 gap-1">
          ${cells.map(dateIso => {
            if (!dateIso) return `<div></div>`;
            const status = dayGymStatus(dateIso);
            const isToday = dateIso === todayIso;
            const isSelected = dateIso === gymCalendarSelectedDate;
            const dotColor = status === 'has' ? 'bg-emerald-500' : 'bg-neutral-700';
            const dayNum = Number(dateIso.slice(8,10));
            return `
              <button onclick="selectGymCalendarDay('${dateIso}')"
                class="aspect-square flex flex-col items-center justify-center rounded-xl text-xs transition
                  ${isSelected ? 'bg-[var(--accent)] text-neutral-950 font-bold' : isToday ? 'border border-[var(--accent)]/60 text-white' : 'text-slate-300 hover:bg-neutral-800'}">
                ${dayNum}
                <span class="w-1.5 h-1.5 rounded-full mt-0.5 ${dotColor}"></span>
              </button>
            `;
          }).join('')}
        </div>

        <div class="flex flex-wrap items-center gap-x-3 gap-y-1 mt-4 pt-3 border-t border-neutral-800 text-[10px] text-slate-500">
          <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> Treino registado</span>
          <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-neutral-700"></span> Sem registo</span>
        </div>
      </div>

      <div class="space-y-3">
        <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wide px-1">${formatDatePT(gymCalendarSelectedDate)}</h2>
        <div id="gymCalendarDaySessions" class="space-y-3">${renderGymCalendarDaySessions()}</div>
      </div>
    </div>
  `;
}

// Espelha refreshBodyCalendarDayAssessments: atualiza só a lista de sessões
// do dia selecionado, sem recriar o calendário todo.
function refreshGymCalendarDaySessions(){
  const container = document.getElementById('gymCalendarDaySessions');
  if (!container) return;
  container.innerHTML = renderGymCalendarDaySessions();
  if (window.lucide) lucide.createIcons();
}

function renderGymCalendarDaySessions(){
  const daySessions = gymSessions
    .filter(s => s.date === gymCalendarSelectedDate)
    .sort((a,b) => (a.created_at||'').localeCompare(b.created_at||''));
  if (daySessions.length === 0) return `<p class="text-xs text-slate-500 px-1">Sem treinos registados neste dia.</p>`;
  return daySessions.map(renderGymSessionCard).join('');
}

/* ---------- Dashboard de evolução ---------- */
function currentAccentHex(){
  const a = ACCENT_COLORS.find(a => a.key === (state.profile?.accent_color || 'amber'));
  return a ? a.light : '#fb923c';
}
// Género do utilizador para escolher a silhueta ('F' feminina, senão masculina).
function userGender(){ return state.profile?.gender === 'F' ? 'F' : 'M'; }
function gymRangeBounds(range){
  const today = todayISO();
  if (range === 'semana') return { start: startOfWeekISO(), end: today };
  if (range === 'mes')    return { start: startOfMonthISO(), end: today };
  const d = new Date(); d.setDate(d.getDate() - 89); // trimestre: últimos 90 dias
  return { start: d.toISOString().slice(0, 10), end: today };
}
function sessionVolume(s){
  return (s.workout_session_sets || []).reduce((a, set) => a + ((set.reps || 0) * (set.weight || 0)), 0);
}
function gymSessionsInRange(range){
  const { start, end } = gymRangeBounds(range);
  return gymSessions.filter(s => s.date >= start && s.date <= end);
}
function trainedExercisesInRange(range){
  const names = [];
  gymSessionsInRange(range).forEach(s => (s.workout_session_sets || []).forEach(set => {
    if (set.weight != null && !names.includes(set.exercise_name)) names.push(set.exercise_name);
  }));
  return names.sort((a, b) => a.localeCompare(b));
}

function setGymRange(r){ gymRange = r; refreshGymDashboard(); }
function selectGymExercise(id){ gymChartExercise = id || null; refreshGymDashboard(); }
function refreshGymDashboard(){
  const main = document.getElementById('tab-content');
  if (!main) return;
  main.innerHTML = renderGymDashboard();
  if (window.lucide) lucide.createIcons();
  requestAnimationFrame(renderGymCharts);
}

function renderGymDashboard(){
  const sessions = gymSessionsInRange(gymRange);
  const totalVol = sessions.reduce((a, s) => a + sessionVolume(s), 0);
  const totalSets = sessions.reduce((a, s) => a + (s.workout_session_sets || []).filter(x => x.reps != null && x.weight != null).length, 0);
  const trained = trainedExercisesInRange(gymRange);
  if (gymChartExercise && !trained.includes(gymChartExercise)) gymChartExercise = null;
  const ranges = [{ k:'semana', l:'Esta Semana' }, { k:'mes', l:'Este Mês' }, { k:'trimestre', l:'3 Meses' }];

  return `
    <div class="space-y-4 fade-in">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0" style="background:linear-gradient(135deg,#1e3a8a,#6366f1);">
          <i data-lucide="trending-up" class="w-5 h-5 text-white"></i>
        </div>
        <div><h2 class="text-sm font-bold text-white leading-none">Evolução</h2>
        <p class="text-[11px] text-slate-500 mt-1">${sessions.length} treino(s) no período</p></div>
      </div>

      <div class="flex gap-2">
        ${ranges.map(r => `
          <button onclick="setGymRange('${r.k}')" class="range-chip ${gymRange===r.k?'active':''} flex-1 border border-neutral-700 rounded-xl py-2 text-xs font-semibold text-slate-300 transition">${r.l}</button>`).join('')}
      </div>

      <div class="grid grid-cols-3 gap-2">
        <div class="card rounded-2xl p-3 text-center">
          <p class="text-lg font-bold text-white leading-none">${sessions.length}</p>
          <p class="text-[10px] text-slate-500 mt-1.5">Treinos</p>
        </div>
        <div class="card rounded-2xl p-3 text-center">
          <p class="text-lg font-bold text-white leading-none">${Math.round(totalVol).toLocaleString('pt-PT')}</p>
          <p class="text-[10px] text-slate-500 mt-1.5">Volume (kg)</p>
        </div>
        <div class="card rounded-2xl p-3 text-center">
          <p class="text-lg font-bold text-white leading-none">${totalSets}</p>
          <p class="text-[10px] text-slate-500 mt-1.5">Séries</p>
        </div>
      </div>

      ${sessions.length === 0 ? `
        <div class="min-h-[30vh] flex flex-col items-center justify-center text-center px-6">
          <i data-lucide="bar-chart-3" class="w-10 h-10 text-slate-600 mb-3"></i>
          <p class="text-xs text-slate-500 max-w-xs leading-relaxed">Ainda não há treinos neste período. Termina uma sessão de treino para veres a tua evolução aqui.</p>
        </div>` : `
        <div class="card rounded-2xl p-3.5">
          <p class="text-[11px] font-semibold text-slate-300 mb-2">Volume por dia</p>
          <canvas id="gymVolChart" height="150"></canvas>
        </div>

        <div class="card rounded-2xl p-3.5 space-y-3">
          <div class="flex items-center justify-between gap-2">
            <p class="text-[11px] font-semibold text-slate-300">Progressão por exercício</p>
          </div>
          <select onchange="selectGymExercise(this.value)"
            class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2 text-xs text-white outline-none focus:border-[var(--accent)]/60">
            <option value="">Escolhe um exercício…</option>
            ${trained.map(name => `<option value="${esc(name)}" ${gymChartExercise===name?'selected':''}>${esc(name)}</option>`).join('')}
          </select>
          ${gymChartExercise ? `<canvas id="gymExChart" height="150"></canvas>` :
            `<p class="text-[11px] text-slate-500 text-center py-4">Escolhe um exercício para veres a evolução da carga.</p>`}
        </div>`}
    </div>`;
}

function renderGymCharts(){
  Chart.defaults.color = theme === 'light' ? '#475569' : '#a1a1aa';
  const gridColor = theme === 'light' ? 'rgba(154,116,74,0.45)' : 'rgba(232,163,66,0.3)';
  const accent = currentAccentHex();
  const { start, end } = gymRangeBounds(gymRange);

  // Volume por dia (barras)
  if (gymCharts.vol) { gymCharts.vol.destroy(); gymCharts.vol = null; }
  const volCanvas = document.getElementById('gymVolChart');
  if (volCanvas) {
    const byDay = {};
    for (let d = new Date(start); d.toISOString().slice(0,10) <= end; d.setDate(d.getDate()+1)) byDay[d.toISOString().slice(0,10)] = 0;
    gymSessions.forEach(s => { if (s.date >= start && s.date <= end) byDay[s.date] = (byDay[s.date] || 0) + sessionVolume(s); });
    const days = Object.keys(byDay).sort();
    gymCharts.vol = new Chart(volCanvas, {
      data: {
        labels: days.map(d => d.slice(8,10) + '/' + d.slice(5,7)),
        datasets: [{ type:'bar', label:'Volume (kg)', data: days.map(d => byDay[d]), backgroundColor: hexToRgba(accent, 0.6), borderRadius:4 }]
      },
      options: {
        responsive:true,
        plugins:{ legend:{ display:false } },
        scales:{ y:{ beginAtZero:true, grid:{ color:gridColor } }, x:{ grid:{ display:false } } }
      }
    });
  }

  // Progressão da carga por exercício (linha)
  if (gymCharts.ex) { gymCharts.ex.destroy(); gymCharts.ex = null; }
  const exCanvas = document.getElementById('gymExChart');
  if (exCanvas && gymChartExercise) {
    const points = [];
    gymSessions.filter(s => s.date >= start && s.date <= end)
      .slice().sort((a,b) => a.date < b.date ? -1 : 1)
      .forEach(s => {
        const best = (s.workout_session_sets || [])
          .filter(x => x.exercise_name === gymChartExercise && x.weight != null)
          .reduce((m,x) => Math.max(m, x.weight), 0);
        if (best > 0) points.push({ date: s.date, best });
      });
    gymCharts.ex = new Chart(exCanvas, {
      type:'line',
      data: {
        labels: points.map(p => p.date.slice(8,10) + '/' + p.date.slice(5,7)),
        datasets: [{ label:'Melhor carga (kg)', data: points.map(p => p.best), borderColor: accent, backgroundColor: hexToRgba(accent, 0.15), fill:true, tension:0.3, pointRadius:3, borderWidth:2 }]
      },
      options: {
        responsive:true,
        plugins:{ legend:{ display:false } },
        scales:{ y:{ beginAtZero:false, grid:{ color:gridColor } }, x:{ grid:{ display:false } } }
      }
    });
  }
}

/* ============================= DASHBOARD ============================= */
function setRange(range){
  activeRange = range;
  refreshDashboard();
}

function selectMacro(key){
  selectedMacro = key;
  refreshDashboard();
}

// Atualização in-place do dashboard — não toca no header, nav ou vertical strip,
// e não aciona a animação fade-in, eliminando o flash ao mudar range/macro.
function refreshDashboard(){
  const main = document.getElementById('tab-content');
  if (!main) return;
  main.innerHTML = renderDashboard(false);
  if (window.lucide) lucide.createIcons();
  requestAnimationFrame(renderDashChart);
}

function toggleMicros(){
  microsCollapsed = !microsCollapsed;
  refreshDashboard();
}

function renderDashboard(animate = true){
  const profile = state.profile || {};
  const { daysElapsed } = rangeBounds(activeRange);
  const totals = rangeTotals(activeRange);
  const rangeLabel = activeRange === 'hoje' ? 'Hoje' : activeRange === 'semana' ? 'Esta Semana' : 'Este Mês';

  const macroCards = MACROS.map(m => {
    const goal = (Number(profile[m.goalKey]) || 0) * daysElapsed;
    const consumed = totals[m.key];
    const remaining = goal - consumed;
    const pct = goal > 0 ? Math.min(100, (consumed/goal)*100) : 0;
    const over = remaining < 0;
    const isSelected = selectedMacro === m.key;

    return `
      <button onclick="selectMacro('${m.key}')"
        class="card rounded-2xl p-4 text-left transition ${isSelected ? 'ring-2' : ''}" style="${isSelected ? `--tw-ring-color:${m.color};` : ''}">
        <div class="flex items-center justify-between gap-1 mb-1">
          <span class="text-xs min-w-0 truncate ${isSelected ? 'text-white font-semibold' : 'text-slate-400'} flex items-center gap-1">
            ${m.label}${isSelected ? `<i data-lucide="bar-chart-3" class="w-3 h-3 shrink-0" style="color:${m.color}"></i>` : ''}
          </span>
          <span class="text-[10px] px-1.5 py-0.5 rounded-full shrink-0 whitespace-nowrap ${over ? 'bg-red-500/15 text-red-400 border border-red-500/40' : 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30'}">
            ${over ? `${Math.abs(remaining).toFixed(0)} ${m.unit} acima` : `restam ${remaining.toFixed(0)} ${m.unit}`}
          </span>
        </div>
        <p class="text-lg font-bold text-white leading-none mb-2">${consumed.toFixed(0)}<span class="text-[11px] text-slate-500 font-normal"> / ${goal.toFixed(0)} ${m.unit}</span></p>
        <div class="w-full h-2 rounded-full bg-neutral-800 border border-neutral-700 overflow-hidden">
          <div class="h-full rounded-full" style="width:${pct}%; background:${over ? '#ef4444' : m.color}"></div>
        </div>
      </button>
    `;
  }).join('');

  const microRows = MICROS.map(mi => `
    <div class="flex justify-between py-1.5 border-b border-neutral-900 last:border-0">
      <span class="text-xs text-slate-400">${mi.label}</span>
      <span class="text-xs text-white font-semibold">${totals[mi.key].toFixed(mi.unit==='mg'?0:1)} ${mi.unit}</span>
    </div>
  `).join('');

  return `
    <div class="space-y-4 ${animate ? 'fade-in' : ''}">
      <div class="flex gap-2">
        ${['hoje','semana','mes'].map(r => `
          <button onclick="setRange('${r}')"
            class="range-chip ${activeRange===r?'active':''} flex-1 border border-neutral-700 rounded-xl py-2 text-xs font-semibold text-slate-300 transition">
            ${r==='hoje'?'Hoje':r==='semana'?'Esta Semana':'Este Mês'}
          </button>
        `).join('')}
      </div>

      <p class="text-[11px] text-slate-500 px-1">${rangeLabel} · meta proporcional a ${daysElapsed} dia(s)</p>

      <div class="grid grid-cols-2 gap-3">${macroCards}</div>

      <div class="card rounded-2xl p-4">
        <div class="flex items-center gap-2 mb-3">
          <i data-lucide="bar-chart-3" class="w-4 h-4 text-[var(--accent)]"></i>
          <h2 class="text-sm font-semibold text-white">${MACROS.find(m=>m.key===selectedMacro).label} por Dia</h2>
        </div>
        ${state.meals.length ? `<canvas id="dashChart" height="190"></canvas>` : `<p class="text-xs text-slate-500">Regista a tua primeira refeição para veres o gráfico.</p>`}
      </div>

      <div class="card rounded-2xl p-4">
        <button onclick="toggleMicros()" class="w-full flex items-center justify-between ${microsCollapsed ? '' : 'mb-2'}">
          <div class="flex items-center gap-2">
            <i data-lucide="microscope" class="w-4 h-4 text-[var(--accent)]"></i>
            <h2 class="text-sm font-semibold text-white">Micronutrientes · ${rangeLabel}</h2>
          </div>
          <i data-lucide="${microsCollapsed ? 'chevron-down' : 'chevron-up'}" class="w-4 h-4 text-slate-500"></i>
        </button>
        ${microsCollapsed ? '' : microRows}
      </div>
    </div>
  `;
}

function renderDashChart(){
  const canvas = document.getElementById('dashChart');
  if (!canvas) return;
  if (dashChart) { dashChart.destroy(); dashChart = null; }

  const macro = MACROS.find(m => m.key === selectedMacro);
  const { start, end } = rangeBounds(activeRange);
  const byDay = {};
  for (let d = new Date(start); d.toISOString().slice(0,10) <= end; d.setDate(d.getDate()+1)) {
    byDay[d.toISOString().slice(0,10)] = 0;
  }
  state.meals.forEach(meal => {
    if (meal.date >= start && meal.date <= end) {
      byDay[meal.date] = (byDay[meal.date] || 0) + mealNutrients(meal)[macro.key];
    }
  });
  const days = Object.keys(byDay).sort();
  const goal = Number(state.profile?.[macro.goalKey]) || 0;

  Chart.defaults.color = theme === 'light' ? '#475569' : '#a1a1aa';
  dashChart = new Chart(canvas, {
    data: {
      labels: days.map(d => d.slice(8,10) + '/' + d.slice(5,7)),
      datasets: [
        { type:'bar', label:`${macro.label} (${macro.unit})`, data:days.map(d=>byDay[d]), backgroundColor:hexToRgba(macro.color, 0.6), borderRadius:4 },
        { type:'line', label:'Meta', data:days.map(()=>goal), borderColor:'#ef4444', borderDash:[6,4], pointRadius:0, borderWidth:1.5 },
      ]
    },
    options: {
      responsive:true,
      plugins:{ legend:{ labels:{ boxWidth:10, font:{size:10} } } },
      scales: {
        y: { beginAtZero:true, grid:{ color: theme === 'light' ? 'rgba(154,116,74,0.45)' : 'rgba(232,163,66,0.3)' } },
        x: { grid:{ display:false } }
      }
    }
  });
}

/* ============================= CALENDÁRIO ============================= */
function renderCalendario(){
  const monthMeals = mealsForMonth(calendarViewMonth);
  const [y, m] = calendarViewMonth.split('-').map(Number);
  const firstOfMonth = new Date(y, m - 1, 1);
  const daysInMonth = new Date(y, m, 0).getDate();
  const firstWeekday = (firstOfMonth.getDay() + 6) % 7; // 0 = Segunda
  const monthLabel = `${PT_MONTHS[m-1]} ${y}`;
  const todayIso = todayISO();

  const cells = Array(firstWeekday).fill(null);
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }

  return `
    <div class="space-y-4 fade-in">
      <button onclick="goToRegistarForDate(calendarSelectedDate)"
        class="w-full bg-[var(--accent)] text-neutral-950 font-bold text-sm rounded-2xl py-3.5 flex items-center justify-center gap-2 active:scale-[0.98] transition shadow-lg">
        <i data-lucide="camera" class="w-5 h-5"></i> Registar Refeição
      </button>

      <div class="card rounded-2xl p-4">
        <div class="flex items-center justify-between mb-4">
          <button onclick="changeCalendarMonth(-1)" class="p-2 text-slate-400 hover:text-white">
            <i data-lucide="chevron-left" class="w-5 h-5"></i>
          </button>
          <h2 class="text-sm font-bold text-white capitalize">${monthLabel}</h2>
          <button onclick="changeCalendarMonth(1)" class="p-2 text-slate-400 hover:text-white">
            <i data-lucide="chevron-right" class="w-5 h-5"></i>
          </button>
        </div>

        <div class="grid grid-cols-7 gap-1 mb-1">
          ${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d => `<div class="text-center text-[10px] text-slate-600 font-semibold">${d}</div>`).join('')}
        </div>

        ${monthMeals === null ? `
          <div class="flex items-center justify-center h-40 text-slate-500 text-xs gap-2">
            <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> A carregar...
          </div>
        ` : `
        <div class="grid grid-cols-7 gap-1">
          ${cells.map(dateIso => {
            if (!dateIso) return `<div></div>`;
            const status = dayNutrientStatus(dateIso, monthMeals);
            const isToday = dateIso === todayIso;
            const isSelected = dateIso === calendarSelectedDate;
            const dotColor = status === 'ok' ? 'bg-emerald-500' : status === 'over' ? 'bg-red-500' : 'bg-neutral-700';
            const dayNum = Number(dateIso.slice(8,10));
            return `
              <button onclick="selectCalendarDay('${dateIso}')"
                class="aspect-square flex flex-col items-center justify-center rounded-xl text-xs transition
                  ${isSelected ? 'bg-[var(--accent)] text-neutral-950 font-bold' : isToday ? 'border border-[var(--accent)]/60 text-white' : 'text-slate-300 hover:bg-neutral-800'}">
                ${dayNum}
                <span class="w-1.5 h-1.5 rounded-full mt-0.5 ${dotColor}"></span>
              </button>
            `;
          }).join('')}
        </div>
        `}

        <div class="flex flex-wrap items-center gap-x-3 gap-y-1 mt-4 pt-3 border-t border-neutral-800 text-[10px] text-slate-500">
          <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> Objetivos cumpridos</span>

          <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-neutral-700"></span> Sem registos</span>

// Resumo do dia selecionado: total vs meta de cada macro, só aparece quando
// pelo menos um foi excedido (o motivo do ponto vermelho no calendário) — dá
// a resposta direta a "o que foi excedido", em vez de obrigar a comparar
// manualmente cada refeição contra as metas do Perfil.
function renderCalendarDaySummary(monthMeals){
  if (monthMeals === null) return '';
  const dayMeals = monthMeals.filter(m => m.date === calendarSelectedDate);
  if (dayMeals.length === 0) return '';
  const totals = { calories:0, protein:0, carbs:0, fat:0 };
  dayMeals.forEach(meal => {
    const n = mealNutrients(meal);
    totals.calories += n.calories; totals.protein += n.protein;
    totals.carbs += n.carbs; totals.fat += n.fat;
  });
  const p = state.profile || {};
  const rows = MACROS.map(m => {
    const goal = Number(p[m.goalKey]) || 0;
    const value = totals[m.key];
    const hasGoal = goal > 0;
    const over = hasGoal && value > goal;
    return { m, value, goal, hasGoal, over };
  }).filter(r => r.hasGoal);
  const anyOver = rows.some(r => r.over);
  if (!anyOver) return '';

  return `
    <div class="rounded-2xl border border-red-500/30 bg-red-500/5 p-3.5 space-y-2.5">
      <p class="text-[11px] font-semibold text-red-300 uppercase tracking-wide flex items-center gap-1.5">
        <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> Excedeu a meta neste dia
      </p>
      ${rows.map(r => `
        <div>
          <div class="flex items-center justify-between text-xs mb-1">
            <span class="${r.over ? 'text-red-300 font-semibold' : 'text-slate-400'}">${esc(r.m.label)}${r.over ? ' — excedido' : ''}</span>
            <span class="${r.over ? 'text-red-300 font-semibold' : 'text-slate-500'}">${r.value.toFixed(0)} / ${r.goal.toFixed(0)} ${r.m.unit}</span>
          </div>
          <div class="w-full h-1.5 rounded-full overflow-hidden" style="background:${emptyFillColor()}">
            <div class="h-full rounded-full" style="width:${Math.min(100, (r.value / r.goal) * 100)}%;background:${r.over ? '#ef4444' : r.m.color}"></div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// Atualiza só a lista de refeições do dia selecionado (sem recriar o
// calendário todo) — usada ao expandir/colapsar uma refeição no Calendário,
// para evitar o "piscar" do ecrã inteiro que a re-renderização completa
// (com a animação fade-in a repetir) causava a cada toque.
function refreshCalendarDayMeals(){
  const container = document.getElementById('calendarDayMeals');
  if (!container) return;
  container.innerHTML = renderCalendarDayMeals(mealsForMonth(calendarViewMonth));
  if (window.lucide) lucide.createIcons();
}

function renderCalendarDayMeals(monthMeals){
  if (monthMeals === null) return '';
  const dayMeals = monthMeals
    .filter(m => m.date === calendarSelectedDate)
    .sort((a,b) => (a.created_at||'').localeCompare(b.created_at||''));
  if (dayMeals.length === 0) return `<p class="text-xs text-slate-500 px-1">Sem refeições registadas neste dia.</p>`;
  return dayMeals.map(renderMealCard).join('');
}

// Renderizador de Markdown mínimo — escapa HTML primeiro, depois aplica formatação.
function renderMarkdown(md) {
  let s = md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Blocos de código (``` ... ```)
  s = s.replace(/```(?:\w*\n)?([\s\S]*?)```/g,
    (_, c) => `<pre>${c.trimEnd()}</pre>`);
  // Código inline
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // Negrito e itálico
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g,         '<em>$1</em>');
  // Cabeçalhos
  s = s.replace(/^### (.+)$/gm, '<p class="font-semibold text-white text-[11px] uppercase tracking-wide mt-3 mb-0.5">$1</p>');
  s = s.replace(/^## (.+)$/gm,  '<p class="font-bold text-white mt-3 mb-1">$1</p>');
  s = s.replace(/^# (.+)$/gm,   '<p class="font-bold text-white text-base mt-3 mb-1">$1</p>');
  // Linha horizontal
  s = s.replace(/^-{3,}$/gm, '<hr class="border-neutral-700 my-3" />');
  // Listas não ordenadas
  s = s.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  // Listas ordenadas
  s = s.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Agrupar <li> consecutivos
  s = s.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // Quebras de linha
  s = s.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');

  return `<div class="md-body">${s}</div>`;
}

function scrollCoachToBottom() {
  requestAnimationFrame(() => {
    const list = document.getElementById('coachMsgList');
    if (list) list.scrollTop = list.scrollHeight;
  });
}

function coachSuggestion(text) {
  const el = document.getElementById('coachInputEl');
  if (el) { el.value = text; el.focus(); el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
}

async function sendCoachMessage() {
  const textarea = document.getElementById('coachInputEl');
  if (!textarea) return;
  const text = textarea.value.trim();
  if (!text || coachLoading) return;

  coachLoading = true;
  coachSuggestions = [];

  // UI optimista: mostra a mensagem do utilizador imediatamente
  const tempMsg = { id: '__tmp__', role: 'user', content: text, created_at: new Date().toISOString() };
  coachMessages = [...coachMessages, tempMsg];
  textarea.value = '';
  textarea.style.height = 'auto';
  renderCoachInPlace();

  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/coach-chat`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
        'apikey': SUPABASE_ANON_KEY,
      },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    if (!res.ok) {
      const err = new Error(data.error || 'Erro no coach');
      err.detail = data.detail || null;
      throw err;
    }

    // Substitui a mensagem temporária pelas guardadas na BD + resposta do modelo
    coachMessages = coachMessages.filter(m => m.id !== '__tmp__');
    coachMessages.push(data.user_message, data.model_message);
    coachSuggestions = Array.isArray(data.suggestions) ? data.suggestions : [];
    logEvent('success', 'coach_message', null, data.usage || null);
  } catch(e) {
    const msg = e.message || 'Erro inesperado. Tenta novamente.';
    showToast('error', null, msg);
    coachMessages = coachMessages.filter(m => m.id !== '__tmp__');
    logEvent('error', 'coach_message', msg, e.detail ? { detail: e.detail } : null);
  }

  coachLoading = false;
  renderCoachInPlace();
}

// UI otimista igual ao padrão já usado no Coach: mostra logo o registo, e
// desfaz se a escrita na BD falhar — sem isto, cada copo bebido tinha um
// atraso visível até aparecer.
async function logWater(amountMl){
  if (waterBusy || !amountMl || amountMl <= 0) return;
  waterBusy = true;
  const tempId = '__tmp_water__' + Date.now();
  waterLogs = [{ id: tempId, user_id: currentUser.id, date: todayISO(), amount_ml: amountMl, created_at: new Date().toISOString() }, ...waterLogs];
  renderAguaInPlace();
  try {
    const { data, error } = await sb.from('water_logs')
      .insert({ user_id: currentUser.id, date: todayISO(), amount_ml: amountMl })
      .select().single();
    if (error) throw error;
    waterLogs = waterLogs.map(w => w.id === tempId ? data : w);
    // Beber conta como "atividade" — reinicia a contagem do próximo lembrete
    // (ver send-water-reminders: usa este campo para saber se já é devido).
    const nowIso = new Date().toISOString();
    await sb.from('profiles').update({ water_last_activity_at: nowIso }).eq('id', currentUser.id);
    if (state.profile) state.profile.water_last_activity_at = nowIso;
    // Sem voltar a desenhar o ecrã todo aqui: o otimista já mostra o valor
    // certo, e um 2º render tão a seguir ao 1º destruía e recriava a onda
    // animada e os ícones, dando um "flash" duplo. Só reativa os botões.
    waterBusy = false;
    setWaterButtonsBusy(false);
  } catch(e) {
    waterLogs = waterLogs.filter(w => w.id !== tempId);
    showToast('error', null, e.message || 'Não foi possível registar a água.');
    waterBusy = false;
    renderAguaInPlace();
  }
}

function setWaterButtonsBusy(busy){

// Converte a chave pública VAPID (base64url, formato standard do Web Push)
// para o Uint8Array que PushManager.subscribe() exige.
function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; i++) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

// Pede permissão de notificações, subscreve o PushManager (ou reaproveita
// uma subscrição existente) e guarda-a no servidor. Devolve false em
// qualquer falha (permissão recusada, browser sem suporte, erro de rede) —
// quem chama decide a mensagem/estado a mostrar.
async function ensurePushSubscription(){
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    showToast('error', null, 'Este browser não suporta notificações push.');
    return false;
  }
  try {
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      showToast('error', null, 'Permissão de notificações recusada.');
      return false;
    }
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    }
    const json = sub.toJSON();
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/save-push-subscription`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
        'apikey': SUPABASE_ANON_KEY,
      },
      body: JSON.stringify({ endpoint: json.endpoint, keys: json.keys }),
    });
    if (!res.ok) throw new Error('Falha a guardar subscrição no servidor');
    return true;
  } catch(e) {
    console.error(e);
    showToast('error', null, 'Não foi possível ativar as notificações.');
    return false;
  }
}

async function toggleWaterReminder(){
  const enabling = !state.profile.water_reminder_enabled;
  if (enabling) {
    waterSubscribing = true;
    renderAguaInPlace();
    const ok = await ensurePushSubscription();
    waterSubscribing = false;
    if (!ok) { renderAguaInPlace(); return; }
  }
  const nowIso = new Date().toISOString();
  const patch = { water_reminder_enabled: enabling };
  if (enabling) {
    patch.water_last_activity_at = nowIso; // começa a contagem já, não do último registo antigo
    patch.water_reminder_muted_date = null; // um "silenciar resto do dia" antigo não deve sobreviver a reativar
  }
  const { error } = await sb.from('profiles').update(patch).eq('id', currentUser.id);
  if (error) { showToast('error', null, 'Não foi possível guardar.'); renderAguaInPlace(); return; }
  state.profile.water_reminder_enabled = enabling;
  if (enabling) {
    state.profile.water_last_activity_at = nowIso;
    state.profile.water_reminder_muted_date = null;
  }
  showToast('success', null, enabling ? 'Lembretes de água ativados.' : 'Lembretes de água desativados.');
  renderAguaInPlace();
}

// Modal "Silenciar lembrete" — aberto a partir do cartão de água do Início.

// (water_reminder_muted_date, ver send-water-reminders).
function openWaterMuteModal(){
  const el = document.getElementById('waterMuteModal');
  if (!el) return;
  el.innerHTML = `
    <div class="fixed inset-0 z-[60] bg-black/70 flex items-center justify-center px-6"
         onclick="if(event.target===this) closeWaterMuteModal()">
      <div class="bg-neutral-900 border border-neutral-800 rounded-2xl p-5 max-w-xs w-full">
        <p class="text-sm font-bold text-white mb-1">Silenciar lembretes de água</p>
        <p class="text-xs text-slate-400 mb-4 leading-relaxed">Queres saltar só o próximo aviso, ou desligar por hoje?</p>
        <div class="space-y-2">
          <button onclick="snoozeWaterReminder('next')"
            class="w-full border border-neutral-700 text-slate-200 text-xs font-semibold rounded-xl py-2.5">
            Só o próximo
          </button>
          <button onclick="snoozeWaterReminder('today')"
            class="w-full border border-sky-500/40 text-sky-400 text-xs font-semibold rounded-xl py-2.5">
            Resto do dia
          </button>
          <button onclick="closeWaterMuteModal()"
            class="w-full text-slate-500 text-xs font-semibold rounded-xl py-2">
            Cancelar
          </button>
        </div>
      </div>
    </div>
  `;
}
function closeWaterMuteModal(){
  const el = document.getElementById('waterMuteModal');
  if (el) el.innerHTML = '';
}
async function snoozeWaterReminder(scope){
  closeWaterMuteModal();
  if (scope === 'next') {
    const nowIso = new Date().toISOString();
    const { error } = await sb.from('profiles').update({ water_last_activity_at: nowIso }).eq('id', currentUser.id);
    if (error) { showToast('error', null, 'Não foi possível adiar o lembrete.'); return; }
    state.profile.water_last_activity_at = nowIso;
    showToast('success', null, 'Próximo lembrete adiado.');
  } else {
    const today = todayISO();
    const { error } = await sb.from('profiles').update({ water_reminder_muted_date: today }).eq('id', currentUser.id);
    if (error) { showToast('error', null, 'Não foi possível silenciar.'); return; }
    state.profile.water_reminder_muted_date = today;
    showToast('success', null, 'Lembretes silenciados até amanhã.');
  }
  render();
}
async function unmuteWaterReminderToday(){
  const { error } = await sb.from('profiles').update({ water_reminder_muted_date: null }).eq('id', currentUser.id);
  if (!error) {
    state.profile.water_reminder_muted_date = null;
    showToast('success', null, 'Lembretes reativados.');
    render();
  }
}

/* ============================= ADMIN: PAINEL ============================= */
const ADMIN_TABS = [
  { key:'overview', label:'Visão Geral', icon:'layout-grid' },
  { key:'users',    label:'Utilizadores', icon:'users' },
  { key:'metrics',  label:'Métricas', icon:'bar-chart-3' },
  { key:'costs',    label:'Custos API', icon:'circle-dollar-sign' },
  { key:'logs',     label:'Logs', icon:'scroll-text' },
];

function adminUserEmail(userId){
  const u = (adminData && adminData.users || []).find(u => u.id === userId);
  return u ? u.email : userId;
}
function adminUserLabel(userId){
  const u = (adminData && adminData.users || []).find(u => u.id === userId);
  if (!u) return userId || '—';
  return u.display_name ? `${u.display_name} · ${u.email}` : u.email;
}
function accentColorHex(key){
  const c = ACCENT_COLORS.find(a => a.key === key);
  return c ? c.light : '#71717a';
}

function renderAdminPanel(){
  if (adminError && !adminData) {
    return `
      <div class="rounded-2xl border border-red-500/40 bg-red-500/10 p-4 text-center space-y-2">
        <p class="text-xs text-red-300">${esc(adminError)}</p>
        <button onclick="loadAdminData()" class="text-[11px] text-red-200 underline">Tentar novamente</button>
      </div>`;
  }
  if (!adminData) {
    return `<div class="flex items-center justify-center h-[50vh] text-slate-500 text-xs gap-2"><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> A carregar dados de administração...</div>`;
  }
  const body =
    adminTab === 'overview' ? renderAdminOverview() :
    adminTab === 'users'    ? renderAdminUsers() :
    adminTab === 'metrics'  ? renderAdminMetrics() :
    adminTab === 'costs'    ? renderAdminCosts() :
    renderAdminLogs();

  return `
    <div class="space-y-4 fade-in">
      <div class="flex items-center gap-2">
        <i data-lucide="shield-check" class="w-5 h-5 text-[var(--accent)]"></i>
        <h1 class="text-base font-bold text-white">Administração</h1>
      </div>

      <div class="flex gap-2 overflow-x-auto no-scrollbar">
        ${ADMIN_TABS.map(t => `

  const errorsToday = logsToday.filter(l => l.level === 'error').length;

  const stat = (icon, label, value, extra) => `
    <div class="card rounded-2xl p-4">
      <div class="flex items-center gap-2 mb-1.5 text-slate-400">
        <i data-lucide="${icon}" class="w-4 h-4"></i>
        <span class="text-xs">${label}</span>
      </div>
      <p class="text-2xl font-bold text-white leading-none">${value}</p>
      ${extra ? `<p class="text-[11px] text-slate-500 mt-1">${extra}</p>` : ''}
    </div>`;

  return `
    <div class="grid grid-cols-2 gap-3">
      ${stat('users', 'Utilizadores registados', d.users.length)}
      ${stat('utensils', 'Refeições registadas', d.meals.length)}
      ${stat('bot', 'Mensagens ao Coach', d.coachMsgs.filter(m=>m.role==='user').length)}

}

    <div class="space-y-2">
      ${rows.map(u => {
        const mealCount = d.meals.filter(m => m.user_id === u.id).length;
        const msgCount = d.coachMsgs.filter(m => m.user_id === u.id && m.role === 'user').length;

            ${esc((u.display_name || u.email || '?').slice(0,1).toUpperCase())}
          </span>

// Custo real da API Gemini por módulo, a partir dos tokens gravados em
// app_logs (ver logEvent nas chamadas a analyze-meal/analyze-body/coach-chat).
// Eventos sem tokens (falhas antes do Gemini responder) ficam de fora da soma.
function renderAdminCosts(){
  const logs = adminCostLogs || [];
  const byModule = {};
  let totalIn = 0, totalOut = 0, totalCalls = 0;
  for (const l of logs) {
    const meta = l.meta || {};
    const inTok = Number(meta.input_tokens) || 0;
    const outTok = Number(meta.output_tokens) || 0;
    if (!inTok && !outTok) continue;
    const mod = GEMINI_COST_EVENT_MODULE[l.event] || 'Outro';
    if (!byModule[mod]) byModule[mod] = { input:0, output:0, calls:0 };
    byModule[mod].input += inTok;
    byModule[mod].output += outTok;
    byModule[mod].calls += 1;
    totalIn += inTok; totalOut += outTok; totalCalls += 1;
  }
  const totalCost = geminiCost(totalIn, totalOut);
  const modules = Object.entries(byModule).sort((a,b) => geminiCost(b[1].input,b[1].output) - geminiCost(a[1].input,a[1].output));

  return `
    <div class="space-y-3">
      <div class="flex gap-2">
        ${['hoje','semana','mes'].map(r => `
          <button onclick="setAdminCostRange('${r}')"
            class="range-chip ${adminCostRange===r?'active':''} flex-1 border border-neutral-700 rounded-xl py-2 text-xs font-semibold text-slate-300 transition">
            ${r==='hoje'?'Hoje':r==='semana'?'Esta Semana':'Este Mês'}
          </button>
        `).join('')}
      </div>

      ${adminCostLoading ? `
        <div class="flex items-center justify-center py-10 text-slate-500 text-xs gap-2">
          <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> A carregar...
        </div>` : `
        <div class="card rounded-2xl p-4 text-center">
          <p class="text-[10px] text-slate-500 uppercase tracking-wide mb-1">Custo estimado (Gemini)</p>
          <p class="text-3xl font-extrabold text-white">$${totalCost.toFixed(4)}</p>
          <p class="text-[11px] text-slate-500 mt-1">${totalCalls} chamada(s) · ${(totalIn+totalOut).toLocaleString('pt-PT')} tokens</p>
        </div>

        <div class="space-y-2">
          ${modules.length === 0
            ? `<p class="text-xs text-slate-500 text-center py-6">Sem chamadas com dados de tokens neste período.</p>`
            : modules.map(([mod, v]) => `
              <div class="card rounded-xl p-3">
                <div class="flex items-center justify-between mb-1.5">
                  <p class="text-xs font-semibold text-white">${esc(mod)}</p>
                  <p class="text-xs font-bold text-[var(--accent)]">$${geminiCost(v.input,v.output).toFixed(4)}</p>
                </div>
                <p class="text-[11px] text-slate-500">${v.calls} chamada(s) · ${v.input.toLocaleString('pt-PT')} in / ${v.output.toLocaleString('pt-PT')} out tokens</p>
              </div>
            `).join('')}
        </div>

        <p class="text-[10px] text-slate-600 text-center px-2">Preços de referência: $${GEMINI_PRICE_PER_M_INPUT.toFixed(2)} / milhão tokens de input, $${GEMINI_PRICE_PER_M_OUTPUT.toFixed(2)} / milhão tokens de output (gemini-flash-latest, sujeito a alteração).</p>
      `}
    </div>
  `;
}

let adminChartInstance = null;
function renderAdminChart(){
  const canvas = document.getElementById('adminChart');
  if (!canvas || !adminData) return;
  if (adminChartInstance) { adminChartInstance.destroy(); adminChartInstance = null; }

  const { start, end } = rangeBounds(adminMetricsRange);
  const mealsByDay = {}, msgsByDay = {};
  for (let d = new Date(start); d.toISOString().slice(0,10) <= end; d.setDate(d.getDate()+1)) {
    const key = d.toISOString().slice(0,10);
    mealsByDay[key] = 0; msgsByDay[key] = 0;
  }
  adminData.meals.forEach(m => {
    if (m.date >= start && m.date <= end && (!adminSelectedUserId || m.user_id === adminSelectedUserId) && mealsByDay.hasOwnProperty(m.date)) {
      mealsByDay[m.date]++;
    }
  });
  adminData.coachMsgs.forEach(m => {
    if (m.role !== 'user') return;
    const day = (m.created_at||'').slice(0,10);
    if (day >= start && day <= end && (!adminSelectedUserId || m.user_id === adminSelectedUserId) && msgsByDay.hasOwnProperty(day)) {
      msgsByDay[day]++;
    }
  });
  const days = Object.keys(mealsByDay).sort();

  Chart.defaults.color = theme === 'light' ? '#475569' : '#a1a1aa';
  adminChartInstance = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: days.map(d => d.slice(8,10) + '/' + d.slice(5,7)),
      datasets: [
        { label:'Refeições', data:days.map(d=>mealsByDay[d]), backgroundColor:'rgba(16,185,129,0.6)', borderRadius:4 },
        { label:'Msgs Coach', data:days.map(d=>msgsByDay[d]), backgroundColor:'rgba(6,182,212,0.6)', borderRadius:4 },
      ]
    },
    options: {
      responsive:true,
      plugins:{ legend:{ labels:{ boxWidth:10, font:{size:10} } } },
      scales: {
        y: { beginAtZero:true, ticks:{ precision:0 }, grid:{ color: theme === 'light' ? 'rgba(154,116,74,0.45)' : 'rgba(232,163,66,0.3)' } },
        x: { grid:{ display:false } }
      }
    }
  });
}

function renderAdminLogs(){
  const d = adminData;
  const filter = window.__adminLogFilter || 'all';
  const logs = d.logs.filter(l => filter === 'all' || l.level === filter);
  return `
    <div class="space-y-3">
      <div class="flex gap-2">
        ${[['all','Todos'],['success','Sucesso'],['error','Erro']].map(([k,label]) => `
          <button onclick="window.__adminLogFilter='${k}'; render();"
            class="range-chip ${filter===k?'active':''} flex-1 border border-neutral-700 rounded-xl py-2 text-xs font-semibold text-slate-300 transition">
            ${label}
          </button>
        `).join('')}
      </div>
      <div class="space-y-2">
        ${logs.map(l => `
          <div class="card rounded-xl p-3 flex items-start gap-2.5">
            <i data-lucide="${l.level==='error'?'alert-circle':'check-circle-2'}" class="w-4 h-4 shrink-0 mt-0.5 ${l.level==='error'?'text-red-400':'text-emerald-400'}"></i>
            <div class="min-w-0 flex-1">
              <div class="flex items-center justify-between gap-2">
                <p class="text-xs font-semibold text-white truncate">${esc(l.event)}</p>
                <p class="text-[10px] text-slate-600 shrink-0">${new Date(l.created_at).toLocaleString('pt-PT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' })}</p>
              </div>
              <p class="text-[11px] text-slate-500 truncate">${esc(adminUserLabel(l.user_id))}</p>
              ${l.message ? `<p class="text-[11px] mt-1 ${l.level==='error'?'text-red-300/80':'text-slate-400'}">${esc(l.message)}</p>` : ''}
            </div>
          </div>
        `).join('') || `<p class="text-xs text-slate-500 text-center py-6">Sem eventos.</p>`}
      </div>
    </div>
  `;
}

/* ============================= INIT ============================= */
document.addEventListener('DOMContentLoaded', () => {
  render();
  history.replaceState(navSnapshot(), '');
  // Independente do login: só recebe notificações push (lembretes de água)
  // se estiver registado, mas registar não exige sessão nem faz nada visível.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch((e) => console.error('SW falhou:', e));
  }
  sb.auth.onAuthStateChange(async (event, session) => {
    const newUser = session ? session.user : null;
    const wasLoggedIn = !!currentUser;
    currentUser = newUser;

    if (newUser && !wasLoggedIn) {
      await loadAllData();
    } else if (!newUser) {
      state = { profile:null, meals:[] };
      activeVertical = 'home';
      activeTab = 'dashboard';
      signedUrlCache = {};
      signedUrlFailed = {};
      coachMessages = [];
      coachLoading  = false;
      bodyAssessments = [];
      bodyPhotos = [];
      bodyTab = 'dashboard';
      bodyNotes = '';
      expandedAssessmentId = null;
      bodyCalendarViewMonth = todayISO().slice(0,7);
      bodyCalendarSelectedDate = todayISO();
      waterLogs = [];
      waterBusy = false;
      waterSubscribing = false;
      showAdminPanel = false;
      adminData = null;
      adminSelectedUserId = null;
      applyTheme('dark');
      render();
      history.replaceState(navSnapshot(), '');
    }
  });
});

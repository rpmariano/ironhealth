<script>

/* ============================= CONSTANTES ============================= */
const MEAL_TYPES = [

// As "verticais" do IronHealth Coach — Nutrição está implementada; as restantes
// são placeholders "Em breve" até serem desenhadas.
const VERTICALS = [
  { key:'home', label:'Início', icon:'layout-grid' },
  { key:'nutricao', label:'Nutrição', icon:'utensils' },
  { key:'ginasio', label:'Ginásio', icon:'dumbbell', from:'#1e3a8a', to:'#6366f1',
    desc:'Regista os teus treinos de ginásio e acompanha a evolução de cargas, séries e repetições ao longo do tempo.' },
  { key:'corrida', label:'Corrida', icon:'footprints', from:'#9a3412', to:'#f97316',
    desc:'Regista as tuas corridas — distância, ritmo, tempo — e acompanha a tua evolução como corredor.' },
  { key:'coach', label:'Coach', icon:'bot', from:'#155e75', to:'#06b6d4',
    desc:'O teu treinador pessoal com IA vai analisar nutrição, treino e corrida para te dar sugestões — com memória do teu histórico e a estratégia que definires.' },
];

// Cor de sistema escolhível no Perfil — 6 opções fixas, tons vibrantes mas não
// demasiado escuros nem lisos. `dark` é usado no gradiente do cartão "Hoje".
const ACCENT_COLORS = [
  { key:'blue1', label:'Azul Céu', light:'#38bdf8', dark:'#075985' },
  { key:'blue2', label:'Azul Índigo', light:'#818cf8', dark:'#3730a3' },
  { key:'pink', label:'Rosa', light:'#f472b6', dark:'#9d174d' },
  { key:'yellow', label:'Amarelo', light:'#fbbf24', dark:'#92400e' },
  { key:'orange', label:'Laranja', light:'#fb923c', dark:'#9a3412' },
  { key:'green', label:'Verde', light:'#4ade80', dark:'#166534' },
];

/* ============================= ESTADO ============================= */
let state = { profile:null, meals:[] }; // meals: [{...meal, meal_items:[...]}]
let currentUser = null;
let authMode = 'signin';
let authError = null;
let authLoading = false;
let dataLoading = false;
let syncError = null;

let activeVertical = 'home'; // home | nutricao | ginasio | corrida | coach
let activeTab = 'dashboard';
let activeRange = 'hoje'; // hoje | semana | mes

let coachMessages = []; // { id, role, content, created_at }
let coachLoading  = false;
let coachError    = null;
let registarDate = todayISO(); // data pré-preenchida ao entrar em Registar a partir do Calendário
let manualMealId = null;      // refeição a ser construída manualmente (sem foto) no Registar
let expandedMealId = null;
let showAddItemForm = false;
let photos = [];              // [{ dataUrl, base64 }] fotos comprimidas prontas a enviar
const MAX_PHOTOS = 6;
let selectedMealType = 'almoco';
let mealNotes = '';           // observação livre sobre a refeição, antes da análise Gemini
let analyzing = false;
let analyzeError = null;
let analyzeSuccess = null; // { mealType, date, calories } — confirmação após registar
let editingNotesMealId = null; // refeição já submetida cujas observações estão a ser editadas
let editingNotesDraft = '';
let reanalyzingMealId = null;  // refeição atualmente a ser reanalisada pelo Gemini
let reanalyzeError = null;
let signedUrlCache = {};      // photo_path -> signed url
let dashChart = null;
let selectedMacro = 'calories'; // qual macro o gráfico "por Dia" está a mostrar
let microsCollapsed = false;
let theme = 'dark'; // 'dark' | 'light'

let calendarViewMonth = todayISO().slice(0,7);   // 'YYYY-MM' do mês visível
let calendarSelectedDate = todayISO();
let calendarCache = {};       // 'YYYY-MM' -> refeições desse mês (meses != atual)
let calendarLoading = false;

/* ============================= HELPERS ============================= */
function todayISO(){ return new Date().toISOString().slice(0,10); }
function formatDatePT(iso){
  const [y,m,d] = iso.split('-').map(Number);
  return `${String(d).padStart(2,'0')} ${PT_MONTHS[m-1]} ${y}`;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function uid(){ return 'tmp-' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function hexToRgba(hex, alpha){
  const n = parseInt(hex.replace('#',''), 16);
  return `rgba(${(n>>16)&255}, ${(n>>8)&255}, ${n&255}, ${alpha})`;
}
function mealTypeLabel(key){ const t = MEAL_TYPES.find(t=>t.key===key); return t ? t.label : key; }
function mealTypeIcon(key){ const t = MEAL_TYPES.find(t=>t.key===key); return t ? t.icon : 'utensils'; }

function applyAccentColor(key){
  const c = ACCENT_COLORS.find(a => a.key === key) || ACCENT_COLORS.find(a => a.key === 'orange');
  document.documentElement.style.setProperty('--accent', c.light);
  document.documentElement.style.setProperty('--accent-dark', c.dark);
}

async function selectAccentColor(key){
  if (!ACCENT_COLORS.some(c => c.key === key) || !state.profile) return;
  state.profile.accent_color = key;
  applyAccentColor(key);
  render();
  try {
    const { error } = await sb.from('profiles').update({ accent_color: key }).eq('id', currentUser.id);
    if (error) throw error;
  } catch(e) { flashSyncError(e); }
}

function applyTheme(key){
  theme = (key === 'light') ? 'light' : 'dark';
  document.documentElement.classList.toggle('light', theme === 'light');
}

async function selectTheme(key){
  if (!['dark','light'].includes(key) || !state.profile) return;
  state.profile.theme = key;
  applyTheme(key);
  render();
  try {
    const { error } = await sb.from('profiles').update({ theme: key }).eq('id', currentUser.id);
    if (error) throw error;
  } catch(e) { flashSyncError(e); }
}

function flashSyncError(e){
  console.error(e);
  syncError = (e && e.message) ? e.message : 'Erro de sincronização.';
  render();
  setTimeout(() => { syncError = null; render(); }, 4000);
}

/* Nutrientes de um item, escalados pela quantidade */
function itemNutrients(item){
  const f = (item.quantity_grams || 0) / 100;
  return {
    calories: f * (item.calories_per_100g || 0),
    protein: f * (item.protein_per_100g || 0),
    carbs: f * (item.carbs_per_100g || 0),
    fat: f * (item.fat_per_100g || 0),
    fiber: f * (item.fiber_per_100g || 0),
    sugar: f * (item.sugar_per_100g || 0),
    sodium: f * (item.sodium_per_100g || 0),
    iron_mg: f * (item.iron_mg_per_100g || 0),
    calcium_mg: f * (item.calcium_mg_per_100g || 0),
    vitamin_c_mg: f * (item.vitamin_c_mg_per_100g || 0),
    potassium_mg: f * (item.potassium_mg_per_100g || 0),
  };
}
function mealNutrients(meal){
  const total = { calories:0, protein:0, carbs:0, fat:0, fiber:0, sugar:0, sodium:0, iron_mg:0, calcium_mg:0, vitamin_c_mg:0, potassium_mg:0 };
  (meal.meal_items || []).forEach(item => {
    const n = itemNutrients(item);
    Object.keys(total).forEach(k => total[k] += n[k]);
  });
  return total;
}

/* Intervalos temporais */
function startOfWeekISO(){
  const d = new Date();
  const day = (d.getDay() + 6) % 7; // segunda = 0
  d.setDate(d.getDate() - day);
  return d.toISOString().slice(0,10);
}
function startOfMonthISO(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
function rangeBounds(range){
  const today = todayISO();
  if (range === 'hoje') return { start: today, end: today, daysElapsed: 1 };
  if (range === 'semana') {
    const start = startOfWeekISO();
    const days = Math.round((new Date(today) - new Date(start)) / 86400000) + 1;
    return { start, end: today, daysElapsed: days };
  }
  const start = startOfMonthISO();
  const days = Number(today.slice(8,10));
  return { start, end: today, daysElapsed: days };
}
function mealsInRange(range){
  const { start, end } = rangeBounds(range);
  return state.meals.filter(m => m.date >= start && m.date <= end);
}
function rangeTotals(range){
  const total = { calories:0, protein:0, carbs:0, fat:0, fiber:0, sugar:0, sodium:0, iron_mg:0, calcium_mg:0, vitamin_c_mg:0, potassium_mg:0 };
  mealsInRange(range).forEach(meal => {
    const n = mealNutrients(meal);
    Object.keys(total).forEach(k => total[k] += n[k]);
  });
  return total;
}

/* ============================= DADOS ============================= */
async function loadAllData(){
  dataLoading = true; render();
  try {
    const userId = currentUser.id;

    // perfil (upsert lazy garante que existe mesmo para contas antigas)
    let { data: profile, error: pErr } = await sb.from('profiles').select('*').eq('id', userId).maybeSingle();
    if (pErr) throw pErr;
    if (!profile) {
      const { data: created, error: cErr } = await sb.from('profiles')
        .insert({ id: userId, display_name: (currentUser.email||'').split('@')[0] })
        .select().single();
      if (cErr) throw cErr;
      profile = created;
    }
    state.profile = profile;
    applyAccentColor(profile.accent_color);
    applyTheme(profile.theme);

    // refeições desde o início do mês ou da semana (o mais antigo) — cobre os 3 presets
    const start = startOfMonthISO() < startOfWeekISO() ? startOfMonthISO() : startOfWeekISO();
    const { data: meals, error: mErr } = await sb.from('meals')
      .select('*, meal_items(*)')
      .eq('user_id', userId)
      .gte('date', start)
      .order('date', { ascending:false })
      .order('created_at', { ascending:false });
    if (mErr) throw mErr;
    state.meals = meals || [];

    // Mensagens do coach (historial completo para exibição; o edge function
    // usa apenas as últimas MAX_HISTORY para o Gemini).
    const { data: cMsgs } = await sb
      .from('coach_messages')
      .select('id, role, content, created_at')
      .eq('user_id', userId)
      .order('created_at', { ascending: true });
    coachMessages = cMsgs || [];

    syncError = null;
  } catch(e) {
    console.error(e);
    syncError = e.message || 'Erro a carregar dados.';
  }
  dataLoading = false;
  render();
}

/* ============================= CALENDÁRIO ============================= */
function shiftMonthKey(monthKey, delta){
  const [y, m] = monthKey.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

// Devolve as refeições do mês pedido, ou null se ainda não estiverem carregadas.
// O mês atual usa sempre state.meals (já carregado no login), evitando um pedido
// redundante; os restantes meses ficam em calendarCache, carregados sob pedido.
function mealsForMonth(monthKey){
  if (monthKey === todayISO().slice(0,7)) {
    return state.meals.filter(m => m.date.slice(0,7) === monthKey);
  }
  return calendarCache[monthKey] || null;
}

async function ensureCalendarMonthLoaded(monthKey){
  if (mealsForMonth(monthKey) !== null) return;
  calendarLoading = true; render();
  try {
    const [y, m] = monthKey.split('-').map(Number);
    const start = `${monthKey}-01`;
    const end = new Date(y, m, 0).toISOString().slice(0,10); // último dia do mês
    const { data, error } = await sb.from('meals')
      .select('*, meal_items(*)')
      .eq('user_id', currentUser.id)
      .gte('date', start)
      .lte('date', end)
      .order('date', { ascending:true });
    if (error) throw error;
    calendarCache[monthKey] = data || [];
  } catch(e) {
    flashSyncError(e);
    calendarCache[monthKey] = [];
  }
  calendarLoading = false;
  render();
}

function changeCalendarMonth(delta){
  calendarViewMonth = shiftMonthKey(calendarViewMonth, delta);
  ensureCalendarMonthLoaded(calendarViewMonth);
  render();
}

function selectCalendarDay(dateIso){
  calendarSelectedDate = dateIso;
  render();
}

// 'ok' (dentro das metas), 'over' (algum macro excedido), 'none' (sem refeições)
function dayNutrientStatus(dateIso, monthMeals){
  const dayMeals = (monthMeals || []).filter(m => m.date === dateIso);
  if (dayMeals.length === 0) return 'none';
  const totals = { calories:0, protein:0, carbs:0, fat:0 };
  dayMeals.forEach(meal => {
    const n = mealNutrients(meal);
    totals.calories += n.calories; totals.protein += n.protein;
    totals.carbs += n.carbs; totals.fat += n.fat;
  });
  const p = state.profile || {};
  const over = MACROS.some(m => totals[m.key] > (Number(p[m.goalKey]) || Infinity));
  return over ? 'over' : 'ok';
}

/* Refeições podem viver em state.meals (mês atual) ou em calendarCache (outros
   meses do Calendário) — estas funções procuram em todas as coleções carregadas
   para que editar/eliminar funcione também a partir do Calendário. */
function allLoadedMealArrays(){
  const arrays = [state.meals];
  Object.values(calendarCache).forEach(arr => { if (arr) arrays.push(arr); });
  return arrays;
}
function findMealById(id){
  for (const arr of allLoadedMealArrays()) {
    const meal = arr.find(m => m.id === id);
    if (meal) return { meal, array: arr };
  }
  return null;
}
function findMealByItemId(itemId){
  for (const arr of allLoadedMealArrays()) {
    const meal = arr.find(m => (m.meal_items||[]).some(i => i.id === itemId));
    if (meal) return meal;
  }
  return null;
}

async function updateItemQuantity(itemId, grams){
  const meal = findMealByItemId(itemId);
  const item = meal && meal.meal_items.find(i => i.id === itemId);
  if (!item) return;
  const value = Math.max(0, Number(grams) || 0);
  item.quantity_grams = value;
  render();
  try {
    const { error } = await sb.from('meal_items').update({ quantity_grams: value }).eq('id', itemId);
    if (error) throw error;
  } catch(e) { flashSyncError(e); }
}

async function deleteMealItem(itemId){
  const meal = findMealByItemId(itemId);
  if (!meal) return;
  meal.meal_items = meal.meal_items.filter(i => i.id !== itemId);
  render();
  try {
    const { error } = await sb.from('meal_items').delete().eq('id', itemId);
    if (error) throw error;
  } catch(e) { flashSyncError(e); }
}

async function deleteMeal(mealId){
  const found = findMealById(mealId);
  if (!found) return;
  const { meal, array } = found;
  array.splice(array.indexOf(meal), 1);
  if (expandedMealId === mealId) expandedMealId = null;
  if (manualMealId === mealId) manualMealId = null;
  render();
  try {
    if (meal.photo_paths && meal.photo_paths.length) await sb.storage.from('meal-photos').remove(meal.photo_paths);
    const { error } = await sb.from('meals').delete().eq('id', mealId);
    if (error) throw error;
  } catch(e) { flashSyncError(e); }
}

// Comprime um ficheiro: máx 1280px no lado maior, JPEG q0.8
function compressImage(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      img.onerror = reject;
      img.onload = () => {
        const maxSide = 1280;
        const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        resolve({ dataUrl, base64: dataUrl.split(',')[1] });
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function onPhotoSelected(input){
  const files = Array.from(input.files || []);
  input.value = ''; // permite voltar a escolher o mesmo ficheiro
  if (!files.length) return;
  analyzeError = null;
  analyzeSuccess = null;
  const remaining = MAX_PHOTOS - photos.length;
  if (remaining <= 0) { analyzeError = `Máximo de ${MAX_PHOTOS} fotos.`; render(); return; }
  for (const file of files.slice(0, remaining)) {
    try { photos.push(await compressImage(file)); }
    catch(e) { console.warn('Falha a processar imagem', e); }
  }
  render();
}

function removePhoto(index){

}

}

async function analyzeMeal(){
  if (!photos.length || analyzing) return;
  const date = document.getElementById('mealDate').value || todayISO();
  analyzing = true; analyzeError = null; analyzeSuccess = null;
  render();
  try {
    const { data, error } = await sb.functions.invoke('analyze-meal', {
      body: { images: photos.map(p => p.base64), mime_type: 'image/jpeg', date, meal_type: selectedMealType, notes: mealNotes || null },
    });
    if (error) {
      let msg = error.message || 'Falha na análise.';
      // FunctionsHttpError: tentar extrair a mensagem do corpo
      if (error.context && typeof error.context.json === 'function') {
        try { const body = await error.context.json(); if (body && body.error) msg = body.error; } catch(_){}
      }
      throw new Error(msg);
    }
    if (data && data.error) throw new Error(data.error);

    const meal = data.meal;
    meal.meal_items = data.items || [];
    state.meals.unshift(meal);
    state.meals.sort((a,b) => b.date.localeCompare(a.date) || (b.created_at||'').localeCompare(a.created_at||''));
    photos = [];
    mealNotes = '';
    expandedMealId = meal.id;
    analyzeSuccess = { mealType: meal.meal_type, date: meal.date, calories: mealNutrients(meal).calories, itemCount: meal.meal_items.length };
  } catch(e) {
    console.error(e);
    analyzeError = e.message || 'Falha na análise. Tenta novamente.';
  }
  analyzing = false;
  render();
}

async function startManualMeal(){

    data.meal_items = [];
    state.meals.unshift(data);

async function reanalyzeMeal(mealId){
  if (reanalyzingMealId) return;
  reanalyzingMealId = mealId;
  reanalyzeError = null;
  render();
  try {
    const { data, error } = await sb.functions.invoke('analyze-meal', {
      body: { meal_id: mealId, notes: editingNotesDraft || null },
    });
    if (error) {
      let msg = error.message || 'Falha na reanálise.';
      if (error.context && typeof error.context.json === 'function') {
        try { const body = await error.context.json(); if (body && body.error) msg = body.error; } catch(_){}
      }
      throw new Error(msg);
    }
    if (data && data.error) throw new Error(data.error);

    const updatedMeal = data.meal;
    updatedMeal.meal_items = data.items || [];
    const arrays = allLoadedMealArrays();
    for (const arr of arrays) {
      const idx = arr.findIndex(m => m.id === mealId);
      if (idx !== -1) arr[idx] = updatedMeal;
    }
    editingNotesMealId = null;
    editingNotesDraft = '';
  } catch(e) {
    console.error(e);
    reanalyzeError = e.message || 'Falha na reanálise. Tenta novamente.';
  }
  reanalyzingMealId = null;
  render();
}

// Abandona uma refeição manual em construção ao navegar para longe do Registar
// (a refeição já está gravada, só a sessão de edição na UI é que se fecha).
function abandonManualMealSession(){
  if (!manualMealId) return;
  manualMealId = null;
  expandedMealId = null;
  showAddItemForm = false;
}

// Troca de vertical (Início / Nutrição / Ginásio / Corrida / Coach).
function switchVertical(vertical){
  activeVertical = vertical;
  analyzeError = null;
  analyzeSuccess = null;
  abandonManualMealSession();
  // Registar e Perfil são acedidos por atalhos dedicados, não pelo nav inferior
  // da Nutrição (só Dashboard/Calendário) — entrar na vertical a partir daí
  // (ex: cartão "Nutrição" no Início) não deve reabrir esses ecrãs "presos".
  if (vertical === 'nutricao' && (activeTab === 'perfil' || activeTab === 'registar')) {
    activeTab = 'dashboard';
  }
  if (vertical === 'nutricao' && activeTab === 'calendario') ensureCalendarMonthLoaded(calendarViewMonth);
  render();
}

function switchTab(tab){
  activeTab = tab;
  analyzeError = null;
  analyzeSuccess = null;
  abandonManualMealSession();
  if (tab === 'calendario') ensureCalendarMonthLoaded(calendarViewMonth);
  render();
}

// Entra em Registar (vertical Nutrição) com a data do dia selecionado já preenchida.
function goToRegistarForDate(dateIso){
  registarDate = dateIso;
  activeVertical = 'nutricao';
  activeTab = 'registar';
  analyzeError = null;
  analyzeSuccess = null;
  abandonManualMealSession();

// Atalho global do cabeçalho — Perfil já não vive no submenu da Nutrição.

  analyzeSuccess = null;

  // Perfil é um atalho global, não pertence a nenhuma vertical — não deve

  const noneActive = activeVertical === 'nutricao' && activeTab === 'perfil';

function render(){

  const verticalStrip = document.getElementById('verticalStrip');
  const main = document.getElementById('tab-content');

    verticalStrip.classList.add('hidden');

    if (window.lucide) lucide.createIcons();
    return;
  }

  verticalStrip.classList.remove('hidden');
  verticalStrip.innerHTML = renderVerticalStrip();

  const showPerfilShortcut = !(activeVertical === 'nutricao' && activeTab === 'perfil');
  headerActions.innerHTML = `
    ${syncError
      ? `<span class="text-[11px] text-red-400 flex items-center gap-1 bg-red-400/10 border border-red-400/30 px-2 py-1 rounded-full"><i data-lucide="cloud-off" class="w-3.5 h-3.5"></i></span>`

        <i data-lucide="user" class="w-3.5 h-3.5"></i> Perfil

  if (dataLoading) {
    nav.classList.add('hidden');
    main.innerHTML = `<div class="flex items-center justify-center h-[60vh] text-slate-500 text-xs gap-2"><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> A carregar dados...</div>`;
    if (window.lucide) lucide.createIcons();
    return;
  }

  if (activeVertical !== 'nutricao') {
    nav.classList.add('hidden');
    if (activeVertical === 'coach') {
      // Layout especial: o main torna-se um flex column sem scroll próprio
      // para que a lista de mensagens e o input partilhem a altura disponível.
      main.classList.remove('overflow-y-auto', 'pb-28');
      main.classList.add('overflow-hidden', 'pb-4', 'flex', 'flex-col');
      main.innerHTML = renderCoach();
      if (window.lucide) lucide.createIcons();
      scrollCoachToBottom();
    } else {
      main.classList.remove('overflow-hidden', 'pb-4', 'flex', 'flex-col');
      main.classList.add('overflow-y-auto', 'pb-28');
      if (activeVertical === 'home') main.innerHTML = renderHome();
      else main.innerHTML = renderVerticalPlaceholder(VERTICALS.find(v => v.key === activeVertical));
      if (window.lucide) lucide.createIcons();
    }
    return;
  }

  // Restaurar layout normal ao entrar na vertical Nutrição (caso venha do Coach)
  main.classList.remove('overflow-hidden', 'pb-4', 'flex', 'flex-col');
  main.classList.add('overflow-y-auto', 'pb-28');

  // Perfil é um atalho global (não um separador de Dashboard/Calendário) —
  // o nav inferior da Nutrição não deve ficar visível enquanto lá estivermos.
  if (activeTab === 'perfil') {
    nav.classList.add('hidden');
  } else {
    nav.classList.remove('hidden');
    const navHighlight = activeTab === 'registar' ? 'calendario' : activeTab; // Registar é acedido a partir do Calendário
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === navHighlight);
    });
  }
  if (activeTab === 'dashboard') main.innerHTML = renderDashboard();
  else if (activeTab === 'registar') main.innerHTML = renderRegistar();
  else if (activeTab === 'calendario') main.innerHTML = renderCalendario();
  else if (activeTab === 'perfil') main.innerHTML = renderPerfil();

  if (window.lucide) lucide.createIcons();
  if (activeTab === 'dashboard') requestAnimationFrame(renderDashChart);
}

/* ============================= DASHBOARD ============================= */
function setRange(range){
  activeRange = range;
  refreshDashboard();
}

function selectMacro(key){
  selectedMacro = key;
  refreshDashboard();
}

// Atualização in-place do dashboard — não toca no header, nav ou vertical strip,
// e não aciona a animação fade-in, eliminando o flash ao mudar range/macro.
function refreshDashboard(){
  const main = document.getElementById('tab-content');
  if (!main) return;
  main.innerHTML = renderDashboard(false);
  if (window.lucide) lucide.createIcons();
  requestAnimationFrame(renderDashChart);
}

function toggleMicros(){
  microsCollapsed = !microsCollapsed;
  refreshDashboard();
}

function renderDashboard(animate = true){
  const profile = state.profile || {};
  const { daysElapsed } = rangeBounds(activeRange);
  const totals = rangeTotals(activeRange);
  const rangeLabel = activeRange === 'hoje' ? 'Hoje' : activeRange === 'semana' ? 'Esta Semana' : 'Este Mês';

  const macroCards = MACROS.map(m => {
    const goal = (Number(profile[m.goalKey]) || 0) * daysElapsed;
    const consumed = totals[m.key];
    const remaining = goal - consumed;
    const pct = goal > 0 ? Math.min(100, (consumed/goal)*100) : 0;
    const over = remaining < 0;
    const isSelected = selectedMacro === m.key;

    return `
      <button onclick="selectMacro('${m.key}')"
        class="card rounded-2xl p-4 text-left transition ${isSelected ? 'ring-2' : ''}" style="${isSelected ? `--tw-ring-color:${m.color};` : ''}">
        <div class="flex items-center justify-between gap-1 mb-1">
          <span class="text-xs min-w-0 truncate ${isSelected ? 'text-white font-semibold' : 'text-slate-400'} flex items-center gap-1">
            ${m.label}${isSelected ? `<i data-lucide="bar-chart-3" class="w-3 h-3 shrink-0" style="color:${m.color}"></i>` : ''}
          </span>
          <span class="text-[10px] px-1.5 py-0.5 rounded-full shrink-0 whitespace-nowrap ${over ? 'bg-red-500/15 text-red-400 border border-red-500/40' : 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30'}">
            ${over ? `${Math.abs(remaining).toFixed(0)} ${m.unit} acima` : `restam ${remaining.toFixed(0)} ${m.unit}`}
          </span>
        </div>
        <p class="text-lg font-bold text-white leading-none mb-2">${consumed.toFixed(0)}<span class="text-[11px] text-slate-500 font-normal"> / ${goal.toFixed(0)} ${m.unit}</span></p>
        <div class="w-full h-2 rounded-full bg-neutral-800 overflow-hidden">
          <div class="h-full rounded-full" style="width:${pct}%; background:${over ? '#ef4444' : m.color}"></div>
        </div>
      </button>
    `;
  }).join('');

  const microRows = MICROS.map(mi => `
    <div class="flex justify-between py-1.5 border-b border-neutral-900 last:border-0">
      <span class="text-xs text-slate-400">${mi.label}</span>
      <span class="text-xs text-white font-semibold">${totals[mi.key].toFixed(mi.unit==='mg'?0:1)} ${mi.unit}</span>
    </div>
  `).join('');

  return `
    <div class="space-y-4 ${animate ? 'fade-in' : ''}">
      <div class="flex gap-2">
        ${['hoje','semana','mes'].map(r => `
          <button onclick="setRange('${r}')"
            class="range-chip ${activeRange===r?'active':''} flex-1 border border-neutral-700 rounded-xl py-2 text-xs font-semibold text-slate-300 transition">
            ${r==='hoje'?'Hoje':r==='semana'?'Esta Semana':'Este Mês'}
          </button>
        `).join('')}
      </div>

      <p class="text-[11px] text-slate-500 px-1">${rangeLabel} · meta proporcional a ${daysElapsed} dia(s)</p>

      <div class="grid grid-cols-2 gap-3">${macroCards}</div>

      <div class="card rounded-2xl p-4">
        <div class="flex items-center gap-2 mb-3">
          <i data-lucide="bar-chart-3" class="w-4 h-4 text-[var(--accent)]"></i>
          <h2 class="text-sm font-semibold text-white">${MACROS.find(m=>m.key===selectedMacro).label} por Dia</h2>
        </div>
        ${state.meals.length ? `<canvas id="dashChart" height="190"></canvas>` : `<p class="text-xs text-slate-500">Regista a tua primeira refeição para veres o gráfico.</p>`}
      </div>

      <div class="card rounded-2xl p-4">
        <button onclick="toggleMicros()" class="w-full flex items-center justify-between ${microsCollapsed ? '' : 'mb-2'}">
          <div class="flex items-center gap-2">
            <i data-lucide="microscope" class="w-4 h-4 text-[var(--accent)]"></i>
            <h2 class="text-sm font-semibold text-white">Micronutrientes · ${rangeLabel}</h2>
          </div>
          <i data-lucide="${microsCollapsed ? 'chevron-down' : 'chevron-up'}" class="w-4 h-4 text-slate-500"></i>
        </button>
        ${microsCollapsed ? '' : microRows}
      </div>
    </div>
  `;
}

function renderDashChart(){
  const canvas = document.getElementById('dashChart');
  if (!canvas) return;
  if (dashChart) { dashChart.destroy(); dashChart = null; }

  const macro = MACROS.find(m => m.key === selectedMacro);
  const { start, end } = rangeBounds(activeRange);
  const byDay = {};
  for (let d = new Date(start); d.toISOString().slice(0,10) <= end; d.setDate(d.getDate()+1)) {
    byDay[d.toISOString().slice(0,10)] = 0;
  }
  state.meals.forEach(meal => {
    if (meal.date >= start && meal.date <= end) {
      byDay[meal.date] = (byDay[meal.date] || 0) + mealNutrients(meal)[macro.key];
    }
  });
  const days = Object.keys(byDay).sort();
  const goal = Number(state.profile?.[macro.goalKey]) || 0;

  Chart.defaults.color = theme === 'light' ? '#475569' : '#a1a1aa';
  dashChart = new Chart(canvas, {
    data: {
      labels: days.map(d => d.slice(8,10) + '/' + d.slice(5,7)),
      datasets: [
        { type:'bar', label:`${macro.label} (${macro.unit})`, data:days.map(d=>byDay[d]), backgroundColor:hexToRgba(macro.color, 0.6), borderRadius:4 },
        { type:'line', label:'Meta', data:days.map(()=>goal), borderColor:'#ef4444', borderDash:[6,4], pointRadius:0, borderWidth:1.5 },
      ]
    },
    options: {
      responsive:true,
      plugins:{ legend:{ labels:{ boxWidth:10, font:{size:10} } } },
      scales: {
        y: { beginAtZero:true, grid:{ color: theme === 'light' ? 'rgba(148,163,184,0.35)' : 'rgba(63,63,70,0.4)' } },
        x: { grid:{ display:false } }
      }
    }
  });
}

function renderCalendario(){
  const monthMeals = mealsForMonth(calendarViewMonth);
  const [y, m] = calendarViewMonth.split('-').map(Number);
  const firstOfMonth = new Date(y, m - 1, 1);
  const daysInMonth = new Date(y, m, 0).getDate();
  const firstWeekday = (firstOfMonth.getDay() + 6) % 7; // 0 = Segunda
  const monthLabel = `${PT_MONTHS[m-1]} ${y}`;
  const todayIso = todayISO();

  const cells = Array(firstWeekday).fill(null);
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }

  return `
    <div class="space-y-4 fade-in">
      <button onclick="goToRegistarForDate(calendarSelectedDate)"
        class="w-full bg-[var(--accent)] text-neutral-950 font-bold text-sm rounded-2xl py-3.5 flex items-center justify-center gap-2 active:scale-[0.98] transition shadow-lg">
        <i data-lucide="camera" class="w-5 h-5"></i> Registar Refeição
      </button>

      <div class="card rounded-2xl p-4">
        <div class="flex items-center justify-between mb-4">
          <button onclick="changeCalendarMonth(-1)" class="p-2 text-slate-400 hover:text-white">
            <i data-lucide="chevron-left" class="w-5 h-5"></i>
          </button>
          <h2 class="text-sm font-bold text-white capitalize">${monthLabel}</h2>
          <button onclick="changeCalendarMonth(1)" class="p-2 text-slate-400 hover:text-white">
            <i data-lucide="chevron-right" class="w-5 h-5"></i>
          </button>
        </div>

        <div class="grid grid-cols-7 gap-1 mb-1">
          ${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d => `<div class="text-center text-[10px] text-slate-600 font-semibold">${d}</div>`).join('')}
        </div>

        ${monthMeals === null ? `
          <div class="flex items-center justify-center h-40 text-slate-500 text-xs gap-2">
            <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> A carregar...
          </div>
        ` : `
        <div class="grid grid-cols-7 gap-1">
          ${cells.map(dateIso => {
            if (!dateIso) return `<div></div>`;
            const status = dayNutrientStatus(dateIso, monthMeals);
            const isToday = dateIso === todayIso;
            const isSelected = dateIso === calendarSelectedDate;
            const dotColor = status === 'ok' ? 'bg-emerald-500' : status === 'over' ? 'bg-red-500' : 'bg-neutral-700';
            const dayNum = Number(dateIso.slice(8,10));
            return `
              <button onclick="selectCalendarDay('${dateIso}')"
                class="aspect-square flex flex-col items-center justify-center rounded-xl text-xs transition
                  ${isSelected ? 'bg-[var(--accent)] text-neutral-950 font-bold' : isToday ? 'border border-[var(--accent)]/60 text-white' : 'text-slate-300 hover:bg-neutral-800'}">
                ${dayNum}
                <span class="w-1.5 h-1.5 rounded-full mt-0.5 ${isSelected ? 'bg-neutral-950' : dotColor}"></span>
              </button>
            `;
          }).join('')}
        </div>
        `}

        <div class="flex flex-wrap items-center gap-x-3 gap-y-1 mt-4 pt-3 border-t border-neutral-800 text-[10px] text-slate-500">
          <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> Objetivos cumpridos</span>
          <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-red-500"></span> Excedeu um macro</span>
          <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-neutral-700"></span> Sem registos</span>
        </div>
      </div>

      <div class="space-y-3">
        <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wide px-1">${formatDatePT(calendarSelectedDate)}</h2>
        ${renderCalendarDayMeals(monthMeals)}
      </div>
    </div>
  `;
}

function renderCalendarDayMeals(monthMeals){
  if (monthMeals === null) return '';
  const dayMeals = monthMeals
    .filter(m => m.date === calendarSelectedDate)
    .sort((a,b) => (a.created_at||'').localeCompare(b.created_at||''));
  if (dayMeals.length === 0) return `<p class="text-xs text-slate-500 px-1">Sem refeições registadas neste dia.</p>`;
  return dayMeals.map(renderMealCard).join('');
}

// Renderizador de Markdown mínimo — escapa HTML primeiro, depois aplica formatação.
function renderMarkdown(md) {
  let s = md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Blocos de código (``` ... ```)
  s = s.replace(/```(?:\w*\n)?([\s\S]*?)```/g,
    (_, c) => `<pre>${c.trimEnd()}</pre>`);
  // Código inline
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // Negrito e itálico
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g,         '<em>$1</em>');
  // Cabeçalhos
  s = s.replace(/^### (.+)$/gm, '<p class="font-semibold text-white text-[11px] uppercase tracking-wide mt-3 mb-0.5">$1</p>');
  s = s.replace(/^## (.+)$/gm,  '<p class="font-bold text-white mt-3 mb-1">$1</p>');
  s = s.replace(/^# (.+)$/gm,   '<p class="font-bold text-white text-base mt-3 mb-1">$1</p>');
  // Listas não ordenadas
  s = s.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  // Listas ordenadas
  s = s.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Agrupar <li> consecutivos
  s = s.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // Quebras de linha
  s = s.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');

  return `<div class="md-body">${s}</div>`;
}

  requestAnimationFrame(() => {
    const list = document.getElementById('coachMsgList');
    if (list) list.scrollTop = list.scrollHeight;
  });
}

function coachSuggestion(text) {
  const el = document.getElementById('coachInputEl');
  if (el) { el.value = text; el.focus(); el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
}

async function sendCoachMessage() {
  const textarea = document.getElementById('coachInputEl');
  if (!textarea) return;
  const text = textarea.value.trim();
  if (!text || coachLoading) return;

  coachLoading = true;
  coachError   = null;

  // UI optimista: mostra a mensagem do utilizador imediatamente
  const tempMsg = { id: '__tmp__', role: 'user', content: text, created_at: new Date().toISOString() };
  coachMessages = [...coachMessages, tempMsg];
  textarea.value = '';
  textarea.style.height = 'auto';
  renderCoachInPlace();

  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/coach-chat`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
        'apikey': SUPABASE_ANON_KEY,
      },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro no coach');

    // Substitui a mensagem temporária pelas guardadas na BD + resposta do modelo
    coachMessages = coachMessages.filter(m => m.id !== '__tmp__');
    coachMessages.push(data.user_message, data.model_message);
  } catch(e) {
    coachError = e.message || 'Erro inesperado. Tenta novamente.';
    coachMessages = coachMessages.filter(m => m.id !== '__tmp__');
  }

  coachLoading = false;
  renderCoachInPlace();
}

async function clearCoachConversation() {
  if (!confirm('Limpar toda a conversa com o coach?')) return;
  const { error } = await sb.from('coach_messages').delete().eq('user_id', currentUser.id);
  if (!error) {
    coachMessages = [];
    renderCoachInPlace();
  }
}

/* ============================= INIT ============================= */
document.addEventListener('DOMContentLoaded', () => {
  render();
  sb.auth.onAuthStateChange(async (event, session) => {
    const newUser = session ? session.user : null;
    const wasLoggedIn = !!currentUser;
    currentUser = newUser;

    if (newUser && !wasLoggedIn) {
      await loadAllData();
    } else if (!newUser) {
      state = { profile:null, meals:[] };
      activeVertical = 'home';
      activeTab = 'dashboard';
      signedUrlCache = {};
      coachMessages = [];
      coachLoading  = false;
      coachError    = null;
      applyTheme('dark');
      render();
    }
  });
});
</script>

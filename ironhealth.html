<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>IronHealth</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  html, body { background:#09090b; }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-thumb { background:#3f3f46; border-radius:9999px; }
  ::-webkit-scrollbar-track { background:transparent; }

  .card { background:linear-gradient(180deg, rgba(24,24,27,0.9), rgba(15,15,17,0.9)); border:1px solid rgba(63,63,70,0.6); }

  input[type=range].neon-slider { -webkit-appearance:none; appearance:none; width:100%; height:10px; border-radius:9999px; background:#27272a; outline:none; }
  input[type=range].neon-slider::-webkit-slider-thumb {
    -webkit-appearance:none; appearance:none; width:26px; height:26px; border-radius:9999px;
    background:#facc15; border:3px solid #09090b; cursor:pointer;
    box-shadow:0 0 12px 3px rgba(250,204,21,0.65);
  }
  input[type=range].neon-slider::-moz-range-thumb {
    width:26px; height:26px; border-radius:9999px; background:#facc15; border:3px solid #09090b; cursor:pointer;
    box-shadow:0 0 12px 3px rgba(250,204,21,0.65);
  }

  @keyframes alert-flash {
    0%, 100% { box-shadow:0 0 0 0 rgba(239,68,68,0.55); border-color:rgba(239,68,68,0.9); }
    50% { box-shadow:0 0 22px 4px rgba(239,68,68,0.55); border-color:rgba(239,68,68,0.4); }
  }
  .alert-critical { animation: alert-flash 1.4s ease-in-out infinite; }

  .tab-btn.active { color:#facc15; }
  .tab-btn.active .tab-dot { opacity:1; }

  .toggle-btn.active-carn { background:#dc2626; color:#fff; border-color:#dc2626; }
  .toggle-btn.active-veg { background:#10b981; color:#052e1c; border-color:#10b981; }

  .fade-in { animation: fadeIn .25s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px);} to {opacity:1; transform:translateY(0);} }
</style>
</head>
<body class="bg-neutral-950 text-slate-200 font-sans antialiased">
<div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative">

  <header class="sticky top-0 z-20 bg-neutral-950/90 backdrop-blur border-b border-neutral-800 px-4 pt-4 pb-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-9 h-9 rounded-xl bg-yellow-400/10 border border-yellow-400/40 flex items-center justify-center">
        <i data-lucide="zap" class="w-5 h-5 text-yellow-400"></i>
      </div>
      <div>
        <h1 class="text-base font-bold tracking-tight text-white leading-none">IronHealth</h1>
        <p id="header-date" class="text-[11px] text-slate-500 leading-none mt-1"></p>
      </div>
    </div>
    <div id="headerActions" class="flex items-center gap-2"></div>
  </header>

  <main id="tab-content" class="flex-1 px-4 pt-4 pb-28 overflow-y-auto"></main>

  <nav id="bottomNav" class="fixed bottom-0 left-0 right-0 z-20">
    <div class="max-w-md mx-auto bg-neutral-900/95 backdrop-blur border-t border-neutral-800 grid grid-cols-4">
      <button onclick="switchTab('dashboard')" data-tab="dashboard" class="tab-btn flex flex-col items-center gap-1 py-2.5 text-slate-500 text-[11px] font-medium">
        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>Dashboard
        <span class="tab-dot w-1 h-1 rounded-full bg-yellow-400 opacity-0"></span>
      </button>
      <button onclick="switchTab('diario')" data-tab="diario" class="tab-btn flex flex-col items-center gap-1 py-2.5 text-slate-500 text-[11px] font-medium">
        <i data-lucide="book-open" class="w-5 h-5"></i>Diário
        <span class="tab-dot w-1 h-1 rounded-full bg-yellow-400 opacity-0"></span>
      </button>
      <button onclick="switchTab('graficos')" data-tab="graficos" class="tab-btn flex flex-col items-center gap-1 py-2.5 text-slate-500 text-[11px] font-medium">
        <i data-lucide="line-chart" class="w-5 h-5"></i>Gráficos
        <span class="tab-dot w-1 h-1 rounded-full bg-yellow-400 opacity-0"></span>
      </button>
      <button onclick="switchTab('coach')" data-tab="coach" class="tab-btn flex flex-col items-center gap-1 py-2.5 text-slate-500 text-[11px] font-medium">
        <i data-lucide="brain-circuit" class="w-5 h-5"></i>Coach
        <span class="tab-dot w-1 h-1 rounded-full bg-yellow-400 opacity-0"></span>
      </button>
    </div>
  </nav>

</div>

<script>
/* ============================= CONFIGURAÇÃO SUPABASE ============================= */
// 1. Cria um projeto em https://supabase.com
// 2. Corre o ficheiro supabase_schema.sql no SQL Editor do projeto
// 3. Cola aqui o URL e a anon key (Project Settings -> API)
const SUPABASE_URL = 'https://roxfzsiciizkevopgpnl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJveGZ6c2ljaWl6a2V2b3BncG5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNjg0NDksImV4cCI6MjA5ODg0NDQ0OX0.bS7FyzDIqj4Aov18OXw6SsJrx1hT1DxYQfzmeHHH7bw';
const isConfigured = !SUPABASE_URL.startsWith('COLA_AQUI') && !SUPABASE_ANON_KEY.startsWith('COLA_AQUI');
const sb = isConfigured ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

/* ============================= CONSTANTES ============================= */
const CALORIE_GOAL = 1851;
const PROTEIN_GOAL = 160;
const MUSCLE_BASELINE = 65.2;
const CHECKLIST_ITEMS = [
  { key:'creatina', label:'Creatina Creapure (5g)', icon:'flask-conical' },
  { key:'ucii', label:'UC-II Complex (Epicondilite)', icon:'shield-check' },
  { key:'omega3', label:'Ultra Omega-3 (2 Caps)', icon:'droplet' },
  { key:'magnesio', label:'Magnésio Bisglicinato (2 Caps)', icon:'moon' },
  { key:'jefit', label:'Treino Registado no JEFIT', icon:'clipboard-check' },
  { key:'watch', label:'Galaxy Watch em FCR', icon:'watch' },
];
const PT_MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

/* ============================= ESTADO (cache local, espelho da BD) ============================= */
let state = { pain:[], meals:[], bodyMetrics:[], checklist:{}, coachLogs:[] };
let currentUser = null;
let authMode = 'signin';
let authError = null;
let authLoading = false;
let dataLoading = false;
let syncError = null;

function todayISO(){ return new Date().toISOString().slice(0,10); }
function formatDatePT(iso){
  const [y,m,d] = iso.split('-').map(Number);
  return `${String(d).padStart(2,'0')} ${PT_MONTHS[m-1]} ${y}`;
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function flashSyncError(e){
  console.error(e);
  syncError = (e && e.message) ? e.message : 'Erro de sincronização.';
  render();
  setTimeout(() => { syncError = null; render(); }, 4000);
}

function checklistRowToObj(row){
  const obj = {};
  CHECKLIST_ITEMS.forEach(i => obj[i.key] = !!row[i.key]);
  return obj;
}

async function loadAllData(){
  dataLoading = true; render();
  try {
    const userId = currentUser.id;
    const [painRes, mealsRes, bodyRes, checklistRes, coachRes] = await Promise.all([
      sb.from('pain_logs').select('*').eq('user_id', userId),
      sb.from('meals').select('*').eq('user_id', userId).order('created_at', { ascending:true }),
      sb.from('body_metrics').select('*').eq('user_id', userId),
      sb.from('checklist_days').select('*').eq('user_id', userId),
      sb.from('coach_logs').select('*').eq('user_id', userId).order('date', { ascending:false }).order('created_at', { ascending:false }),
    ]);
    [painRes, mealsRes, bodyRes, checklistRes, coachRes].forEach(r => { if (r.error) throw r.error; });

    state.pain = painRes.data.map(r => ({ date:r.date, value:r.value }));
    state.meals = mealsRes.data.map(r => ({ id:r.id, date:r.date, name:r.name, protein:Number(r.protein), calories:Number(r.calories), type:r.type }));
    state.bodyMetrics = bodyRes.data.map(r => ({ date:r.date, weight:Number(r.weight), bodyFat:Number(r.body_fat), muscle:Number(r.muscle) }));
    state.checklist = {};
    checklistRes.data.forEach(r => { state.checklist[r.date] = checklistRowToObj(r); });
    state.coachLogs = coachRes.data.map(r => ({ id:r.id, date:r.date, text:r.text }));
    syncError = null;
  } catch(e) {
    console.error(e);
    syncError = e.message || 'Erro a carregar dados.';
  }
  dataLoading = false;
  render();
}

/* ---- Dor articular ---- */
function getPainEntry(date){ return state.pain.find(p => p.date === date) || null; }
async function setPainToday(value){
  const today = todayISO();
  const existing = getPainEntry(today);
  if (existing) existing.value = value; else state.pain.push({ date:today, value });
  render();
  try {
    const { error } = await sb.from('pain_logs').upsert({ user_id: currentUser.id, date: today, value }, { onConflict:'user_id,date' });
    if (error) throw error;
  } catch(e) { flashSyncError(e); }
}
function sortedPain(){ return [...state.pain].sort((a,b)=> a.date.localeCompare(b.date)); }

/* ---- Refeições ---- */
function mealsOn(date){ return state.meals.filter(m => m.date === date); }
async function addMeal(name, protein, calories, type){
  const today = todayISO();
  const localEntry = { id: uid(), date: today, name, protein, calories, type };
  state.meals.push(localEntry);
  render();
  try {
    const { data, error } = await sb.from('meals').insert({ user_id: currentUser.id, date: today, name, protein, calories, type }).select().single();
    if (error) throw error;
    localEntry.id = data.id;
  } catch(e) {
    state.meals = state.meals.filter(m => m !== localEntry);
    flashSyncError(e);
  }
  render();
}
async function deleteMeal(id){
  state.meals = state.meals.filter(m => m.id !== id);
  render();
  try {
    const { error } = await sb.from('meals').delete().eq('id', id);
    if (error) throw error;
  } catch(e) { flashSyncError(e); }
}
function sumField(list, field){ return list.reduce((acc,m)=> acc + (Number(m[field])||0), 0); }
function dailyNutritionMap(){
  const map = {};
  state.meals.forEach(m => {
    if (!map[m.date]) map[m.date] = { calories:0, protein:0 };
    map[m.date].calories += Number(m.calories)||0;
    map[m.date].protein += Number(m.protein)||0;
  });
  return map;
}

/* ---- Composição corporal ---- */
async function upsertBodyMetric(date, weight, bodyFat, muscle){
  const existing = state.bodyMetrics.find(b => b.date === date);
  if (existing) Object.assign(existing, { weight, bodyFat, muscle });
  else state.bodyMetrics.push({ date, weight, bodyFat, muscle });
  render();
  try {
    const { error } = await sb.from('body_metrics').upsert({ user_id: currentUser.id, date, weight, body_fat: bodyFat, muscle }, { onConflict:'user_id,date' });
    if (error) throw error;
  } catch(e) { flashSyncError(e); }
}
function sortedBodyMetrics(){ return [...state.bodyMetrics].sort((a,b)=> a.date.localeCompare(b.date)); }
function latestBodyMetric(){ const s = sortedBodyMetrics(); return s.length ? s[s.length-1] : null; }

/* ---- Checklist ---- */
function getChecklist(date){
  if (!state.checklist[date]) {
    const obj = {};
    CHECKLIST_ITEMS.forEach(i => obj[i.key] = false);
    state.checklist[date] = obj;
  }
  return state.checklist[date];
}
async function toggleChecklistItem(date, key){
  const c = getChecklist(date);
  c[key] = !c[key];
  render();
  try {
    const payload = Object.assign({ user_id: currentUser.id, date }, c);
    const { error } = await sb.from('checklist_days').upsert(payload, { onConflict:'user_id,date' });
    if (error) throw error;
  } catch(e) { flashSyncError(e); }
}
function isFullyCompliant(date){
  const c = state.checklist[date];
  if (!c) return false;
  return CHECKLIST_ITEMS.every(i => c[i.key]);
}
function complianceStreak(){
  let streak = 0;
  let cursor = new Date();
  while (true) {
    const iso = cursor.toISOString().slice(0,10);
    if (isFullyCompliant(iso)) { streak++; cursor.setDate(cursor.getDate()-1); }
    else break;
  }
  return streak;
}

/* ---- Coach logs ---- */
async function addCoachLog(text){
  const today = todayISO();
  const localEntry = { id: uid(), date: today, text };
  state.coachLogs.unshift(localEntry);
  render();
  try {
    const { data, error } = await sb.from('coach_logs').insert({ user_id: currentUser.id, date: today, text }).select().single();
    if (error) throw error;
    localEntry.id = data.id;
  } catch(e) {
    state.coachLogs = state.coachLogs.filter(l => l !== localEntry);
    flashSyncError(e);
  }
  render();
}
async function deleteCoachLog(id){
  state.coachLogs = state.coachLogs.filter(l => l.id !== id);
  render();
  try {
    const { error } = await sb.from('coach_logs').delete().eq('id', id);
    if (error) throw error;
  } catch(e) { flashSyncError(e); }
}

/* ============================= AUTENTICAÇÃO ============================= */
function renderNotConfigured(){
  return `
    <div class="min-h-[70vh] flex items-center justify-center px-2">
      <div class="card rounded-2xl p-5 max-w-sm space-y-3">
        <div class="flex items-center gap-2">
          <i data-lucide="settings" class="w-5 h-5 text-yellow-400"></i>
          <h2 class="text-sm font-bold text-white">Configuração necessária</h2>
        </div>
        <p class="text-xs text-slate-400 leading-relaxed">
          Ainda não ligaste o IronHealth ao Supabase. Edita as constantes
          <code class="text-yellow-400">SUPABASE_URL</code> e <code class="text-yellow-400">SUPABASE_ANON_KEY</code>
          no topo do &lt;script&gt; com os valores do teu projeto (Project Settings &rarr; API).
        </p>
      </div>
    </div>
  `;
}

function renderAuth(){
  return `
    <div class="min-h-[75vh] flex items-center justify-center px-2 fade-in">
      <div class="card rounded-2xl p-5 w-full max-w-sm space-y-4">
        <div class="flex items-center gap-2 justify-center">
          <i data-lucide="zap" class="w-6 h-6 text-yellow-400"></i>
          <h2 class="text-base font-bold text-white">IronHealth</h2>
        </div>
        <p class="text-xs text-slate-500 text-center">${authMode==='signin' ? 'Entra na tua conta' : 'Cria a tua conta'}</p>

        <div class="space-y-2">
          <input id="authEmail" type="email" placeholder="Email"
            class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2 text-sm text-white placeholder-slate-600 outline-none focus:border-yellow-400/60" />
          <input id="authPassword" type="password" placeholder="Palavra-passe"
            class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2 text-sm text-white placeholder-slate-600 outline-none focus:border-yellow-400/60" />
        </div>

        ${authError ? `<p class="text-[11px] text-red-400">${authError}</p>` : ''}

        <button onclick="submitAuth()" ${authLoading ? 'disabled' : ''}
          class="w-full bg-yellow-400 text-neutral-950 font-bold text-sm rounded-xl py-2.5 flex items-center justify-center gap-1.5 active:scale-[0.98] transition disabled:opacity-50">
          ${authLoading ? '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>' : ''}
          ${authMode==='signin' ? 'Entrar' : 'Criar Conta'}
        </button>

        <button onclick="toggleAuthMode()" class="w-full text-center text-[11px] text-slate-500">
          ${authMode==='signin' ? 'Ainda não tens conta? Criar conta' : 'Já tens conta? Entrar'}
        </button>
      </div>
    </div>
  `;
}

function toggleAuthMode(){
  authMode = authMode === 'signin' ? 'signup' : 'signin';
  authError = null;
  render();
}

async function submitAuth(){
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!email || !password) { authError = 'Preenche email e palavra-passe.'; render(); return; }

  authLoading = true; authError = null; render();
  try {
    if (authMode === 'signin') {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
    } else {
      const { error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      authError = 'Conta criada. Verifica o teu email para confirmar (se exigido) e depois entra.';
      authMode = 'signin';
    }
  } catch(e) {
    authError = e.message || 'Erro de autenticação.';
  }
  authLoading = false;
  render();
}

async function signOut(){
  await sb.auth.signOut();
}

/* ============================= NAVEGAÇÃO ============================= */
let activeTab = 'dashboard';
let lastMealTip = null;
let charts = { pain:null, body:null, nutrition:null };

function switchTab(tab){
  activeTab = tab;
  if (tab !== 'diario') lastMealTip = null;
  render();
}

function render(){
  const nav = document.getElementById('bottomNav');
  const headerActions = document.getElementById('headerActions');
  const main = document.getElementById('tab-content');
  document.getElementById('header-date').textContent = formatDatePT(todayISO());

  if (!isConfigured) {
    nav.classList.add('hidden');
    headerActions.innerHTML = '';
    main.innerHTML = renderNotConfigured();
    if (window.lucide) lucide.createIcons();
    return;
  }

  if (!currentUser) {
    nav.classList.add('hidden');
    headerActions.innerHTML = '';
    main.innerHTML = renderAuth();
    if (window.lucide) lucide.createIcons();
    return;
  }

  nav.classList.remove('hidden');
  headerActions.innerHTML = `
    ${syncError
      ? `<span class="text-[11px] text-red-400 flex items-center gap-1 bg-red-400/10 border border-red-400/30 px-2 py-1 rounded-full"><i data-lucide="cloud-off" class="w-3.5 h-3.5"></i> erro</span>`
      : `<span class="text-[11px] text-emerald-400 flex items-center gap-1 bg-emerald-400/10 border border-emerald-400/30 px-2 py-1 rounded-full"><i data-lucide="cloud" class="w-3.5 h-3.5"></i> sync</span>`}
    <button onclick="signOut()" class="text-slate-500 hover:text-red-400"><i data-lucide="log-out" class="w-4 h-4"></i></button>
  `;

  if (dataLoading) {
    main.innerHTML = `<div class="flex items-center justify-center h-[60vh] text-slate-500 text-xs gap-2"><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> A carregar dados...</div>`;
    if (window.lucide) lucide.createIcons();
    return;
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === activeTab);
  });
  if (activeTab === 'dashboard') main.innerHTML = renderDashboard();
  else if (activeTab === 'diario') main.innerHTML = renderDiario();
  else if (activeTab === 'graficos') main.innerHTML = renderGraficos();
  else if (activeTab === 'coach') main.innerHTML = renderCoach();

  if (window.lucide) lucide.createIcons();

  const painEntry = getPainEntry(todayISO());
  const slider = document.getElementById('painSlider');
  if (slider) updateSliderVisual(slider, painEntry ? painEntry.value : 0);

  if (activeTab === 'graficos') requestAnimationFrame(renderCharts);
}

/* ============================= DASHBOARD ============================= */
function painColor(v){
  if (v > 6) return { text:'text-red-500', ring:'border-red-500', bg:'bg-red-500', label:'CRÍTICO' };
  if (v > 4) return { text:'text-red-400', ring:'border-red-400', bg:'bg-red-400', label:'ALERTA' };
  if (v >= 2) return { text:'text-yellow-400', ring:'border-yellow-400', bg:'bg-yellow-400', label:'ATENÇÃO' };
  return { text:'text-emerald-400', ring:'border-emerald-400', bg:'bg-emerald-400', label:'SEGURO' };
}
function updateSliderVisual(slider, v){
  const pct = (v/10)*100;
  const c = painColor(v);
  const hex = c.bg.includes('red-500') ? '#ef4444' : c.bg.includes('red-400') ? '#f87171' : c.bg.includes('yellow') ? '#facc15' : '#34d399';
  slider.style.background = `linear-gradient(to right, ${hex} ${pct}%, #27272a ${pct}%)`;
}
function onPainInput(el){
  const v = Number(el.value);
  updateSliderVisual(el, v);
  document.getElementById('painValueLabel').textContent = v;
  const badge = document.getElementById('painBadge');
  const c = painColor(v);
  badge.className = `text-[11px] font-bold px-2 py-0.5 rounded-full border ${c.ring} ${c.text} bg-neutral-950`;
  badge.textContent = c.label;
}
function onPainChange(el){
  setPainToday(Number(el.value));
  render();
}

function renderDashboard(){
  const today = todayISO();
  const painEntry = getPainEntry(today);
  const painVal = painEntry ? painEntry.value : 0;
  const c = painColor(painVal);
  const critical = painVal > 4;

  const meals = mealsOn(today);
  const calToday = sumField(meals, 'calories');
  const proToday = sumField(meals, 'protein');
  const calPct = Math.min(100, (calToday/CALORIE_GOAL)*100);
  const proPct = Math.min(100, (proToday/PROTEIN_GOAL)*100);
  const overCal = calToday > CALORIE_GOAL;

  const latest = latestBodyMetric();
  const catabolism = latest && (latest.muscle < MUSCLE_BASELINE * 0.99);

  const streak = complianceStreak();
  const checklist = getChecklist(today);
  const doneCount = CHECKLIST_ITEMS.filter(i => checklist[i.key]).length;

  return `
    <div class="space-y-4 fade-in">

      ${critical ? `
      <div class="alert-critical rounded-2xl border-2 border-red-500 bg-red-950/40 p-4 flex gap-3">
        <i data-lucide="alert-triangle" class="w-6 h-6 text-red-400 shrink-0 mt-0.5"></i>
        <div>
          <p class="text-red-400 font-bold text-sm tracking-wide">CRÍTICO: Protocolo de Segurança Ativado</p>
          <p class="text-red-200 text-xs mt-1 leading-relaxed">Treinos <b>PULL bloqueados</b>. Priorizar Pernas / Isometria. Uso obrigatório de <b>STRAPS</b>.</p>
        </div>
      </div>` : ''}

      ${catabolism ? `
      <div class="rounded-2xl border border-orange-500/60 bg-orange-950/30 p-4 flex gap-3">

/* ============================= DIÁRIO ============================= */
let selectedMealType = 'carnivora';
function selectMealType(type){
  selectedMealType = type;
  document.getElementById('btnCarn').classList.toggle('active-carn', type==='carnivora');
  document.getElementById('btnVeg').classList.toggle('active-veg', type==='vegetariana');
}
async function addMealFromForm(){
  const nameEl = document.getElementById('mealName');
  const proteinEl = document.getElementById('mealProtein');
  const caloriesEl = document.getElementById('mealCalories');
  const errEl = document.getElementById('mealFormError');

  const name = nameEl.value.trim();
  const protein = Number(proteinEl.value);
  const calories = Number(caloriesEl.value);

  if (!name || isNaN(protein) || isNaN(calories) || protein < 0 || calories < 0) {
    errEl.textContent = 'Preenche nome, proteína e calorias com valores válidos.';
    errEl.classList.remove('hidden');
    return;
  }
  errEl.classList.add('hidden');
  lastMealTip = selectedMealType === 'vegetariana' ? 'veg' : 'carn';
  await addMeal(name, protein, calories, selectedMealType);
}
async function saveBodyMetricsFromForm(){
  const weightEl = document.getElementById('bmWeight');
  const bfEl = document.getElementById('bmBodyFat');
  const muscleEl = document.getElementById('bmMuscle');
  const errEl = document.getElementById('bmFormError');

  const weight = Number(weightEl.value);
  const bodyFat = Number(bfEl.value);
  const muscle = Number(muscleEl.value);

  if (isNaN(weight) || isNaN(bodyFat) || isNaN(muscle) || weight<=0 || bodyFat<0 || muscle<=0) {
    errEl.textContent = 'Preenche peso, %BF e massa muscular com valores válidos.';
    errEl.classList.remove('hidden');
    return;
  }
  errEl.classList.add('hidden');
  await upsertBodyMetric(todayISO(), weight, bodyFat, muscle);
}

function renderCharts(){
  const gridColor = 'rgba(63,63,70,0.4)';
  const tickColor = '#a1a1aa';
  Chart.defaults.color = tickColor;
  Chart.defaults.font.family = "system-ui, sans-serif";

  if (charts.pain) { charts.pain.destroy(); charts.pain = null; }
  if (charts.body) { charts.body.destroy(); charts.body = null; }
  if (charts.nutrition) { charts.nutrition.destroy(); charts.nutrition = null; }

  const painCanvas = document.getElementById('chartPain');
  if (painCanvas) {
    const pain = sortedPain();
    const labels = pain.map(p => formatDatePT(p.date));
    const values = pain.map(p => p.value);
    const load = pain.map(p => {
      const c = state.checklist[p.date];
      return c && c.jefit ? 10 : 0;
    });
    charts.pain = new Chart(painCanvas, {
      data: {
        labels,
        datasets: [
          { type:'bar', label:'Treino (JEFIT)', data:load, backgroundColor:'rgba(250,204,21,0.25)', borderRadius:4, yAxisID:'y' },
          { type:'line', label:'Dor (0-10)', data:values, borderColor:'#ef4444', backgroundColor:'#ef4444', tension:0.3, pointRadius:3, yAxisID:'y' },
        ]
      },
      options: {
        responsive:true,
        plugins:{ legend:{ labels:{ boxWidth:10, font:{size:10} } } },
        scales: {
          y: { min:0, max:10, grid:{ color:gridColor }, ticks:{ stepSize:2 } },
          x: { grid:{ display:false } }
        }
      }
    });
  }

  const bodyCanvas = document.getElementById('chartBody');
  if (bodyCanvas) {
    const bm = sortedBodyMetrics();
    const labels = bm.map(b => formatDatePT(b.date));
    charts.body = new Chart(bodyCanvas, {
      type:'line',
      data:{
        labels,
        datasets:[
          { label:'Peso Total (kg)', data:bm.map(b=>b.weight), borderColor:'#facc15', backgroundColor:'#facc15', yAxisID:'y', tension:0.3, pointRadius:3 },
          { label:'Massa Muscular (kg)', data:bm.map(b=>b.muscle), borderColor:'#10b981', backgroundColor:'#10b981', yAxisID:'y1', tension:0.3, pointRadius:3 },
        ]
      },
      options:{
        responsive:true,
        plugins:{ legend:{ labels:{ boxWidth:10, font:{size:10} } } },
        scales:{
          y: { type:'linear', position:'left', grid:{ color:gridColor }, title:{ display:true, text:'Peso (kg)', font:{size:10} } },
          y1: { type:'linear', position:'right', grid:{ display:false }, title:{ display:true, text:'Músculo (kg)', font:{size:10} } },
          x: { grid:{ display:false } }
        }
      }
    });
  }

  const nutriCanvas = document.getElementById('chartNutrition');
  if (nutriCanvas) {
    const map = dailyNutritionMap();
    const dates = Object.keys(map).sort().slice(-14);
    const labels = dates.map(d => formatDatePT(d));
    charts.nutrition = new Chart(nutriCanvas, {
      data:{
        labels,
        datasets:[
          { type:'bar', label:'Calorias', data:dates.map(d=>map[d].calories), backgroundColor:'rgba(250,204,21,0.6)', yAxisID:'y', borderRadius:4 },
          { type:'line', label:'Proteína (g)', data:dates.map(d=>map[d].protein), borderColor:'#10b981', backgroundColor:'#10b981', yAxisID:'y1', tension:0.3, pointRadius:3 },
        ]
      },
      options:{
        responsive:true,
        plugins:{ legend:{ labels:{ boxWidth:10, font:{size:10} } } },
        scales:{
          y:{ type:'linear', position:'left', grid:{ color:gridColor }, title:{ display:true, text:'kcal', font:{size:10} } },
          y1:{ type:'linear', position:'right', grid:{ display:false }, title:{ display:true, text:'g proteína', font:{size:10} } },
          x:{ grid:{ display:false } }
        }
      }
    });
  }
}

/* ============================= INIT ============================= */
document.addEventListener('DOMContentLoaded', () => {
  render();
  if (!isConfigured) return;

  sb.auth.onAuthStateChange(async (event, session) => {
    const newUser = session ? session.user : null;
    const wasLoggedIn = !!currentUser;
    currentUser = newUser;

    if (newUser && !wasLoggedIn) {
      await loadAllData();
    } else if (!newUser) {
      state = { pain:[], meals:[], bodyMetrics:[], checklist:{}, coachLogs:[] };
      activeTab = 'dashboard';
      render();
    }
  });
});
